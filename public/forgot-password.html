<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(91, 163, 224,0.07) 0%, transparent 65%),
                var(--bg-base);
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 44px 40px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.03);
            animation: fadeSlideUp 0.4s var(--ease) both;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-brand .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            display: block;
            margin-bottom: 6px;
        }

        .auth-brand .tagline {
            color: var(--text-2);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: var(--text-2);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-3);
            pointer-events: none;
            line-height: 0;
        }

        .input-icon svg { width: 16px; height: 16px; display: block; }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group input::placeholder { color: var(--text-3); }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #121a28;
            border: none;
            font-weight: 700;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            border-radius: var(--radius-sm);
            margin-top: 6px;
            transition: background 0.2s var(--ease), transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
        }

        .auth-btn:hover {
            background: var(--accent-dark);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .auth-btn:active { transform: translateY(0); }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            color: var(--text-3);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .auth-footer a:hover { opacity: 0.8; text-decoration: underline; }

        .success-box {
            display: none;
            text-align: center;
            padding: 24px 0 8px;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg { width: 30px; height: 30px; }

        .success-box h3 {
            color: var(--text-1);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .success-box p {
            color: var(--text-2);
            font-size: 14px;
            line-height: 1.6;
        }

        .success-box .email-highlight {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="logo-text">Mã Đề 0099</span>
                <span class="tagline">Nhập email để nhận link đặt lại mật khẩu</span>
            </div>

            <div id="form-section">
                <div class="form-group">
                    <label>Email đã đăng ký</label>
                    <div class="input-wrap">
                        <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
                        <input type="email" id="reset-email" placeholder="your@email.com" required>
                    </div>
                </div>

                <button class="auth-btn" id="btnReset">Gửi Link Đặt Lại</button>

                <div class="auth-footer">
                    Nhớ mật khẩu rồi? <a href="login.html">Đăng nhập</a>
                </div>
            </div>

            <div class="success-box" id="success-section">
                <span class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></span>
                <h3>Đã gửi!</h3>
                <p>Kiểm tra hộp thư của <span class="email-highlight" id="sent-email"></span><br>và bấm vào link trong email để đặt lại mật khẩu.</p>
                <div class="auth-footer" style="margin-top: 20px;">
                    <a href="login.html">← Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnReset').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value.trim();
            const btn = document.getElementById('btnReset');

            if (!email) {
                showToast("Vui lòng nhập email!", "warning");
                return;
            }

            btn.textContent = "Đang gửi...";
            btn.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                document.getElementById('sent-email').textContent = email;
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-section').style.display = 'block';
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/user-not-found') {
                    showToast("Không tìm thấy tài khoản với email này!", "error");
                } else if (error.code === 'auth/invalid-email') {
                    showToast("Email không hợp lệ!", "error");
                } else {
                    showToast("Có lỗi xảy ra, vui lòng thử lại!", "error");
                }
                btn.textContent = "Gửi Link Đặt Lại";
                btn.disabled = false;
            }
        });

        document.getElementById('reset-email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btnReset').click();
        });
    </script>
</body>

</html>
