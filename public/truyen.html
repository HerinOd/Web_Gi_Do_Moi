<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đọc Truyện</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reader-container {
            max-width: 800px;
            margin: 100px auto 40px;
            padding: 30px;
            background: #222d3e;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .story-header {
            text-align: center;
            border-bottom: 1px solid #324056;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .story-title {
            font-size: 28px;
            color: #f0a500;
            margin-bottom: 10px;
        }

        .story-author {
            font-style: italic;
            color: #9aa7bc;
        }

        .story-content {
            font-size: 18px;
            line-height: 1.8;
            color: #eceff3;
            white-space: pre-wrap;
            /* Giữ nguyên định dạng xuống dòng của văn bản */
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #f0a500;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="reader-container">
        <a href="index.html" class="back-btn">← Quay lại Trang Chủ</a>

        <div id="story-display">
            <h2 style="text-align: center; color: #9aa7bc;">Đang tải nội dung...</h2>
        </div>
    </div>

    <script type="module">
        // 1. Import hàm doc và getDoc để truy vấn đích danh 1 Object
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function renderStoryDetail() {
            const displayArea = document.getElementById('story-display');

            // Trích xuất ID từ thanh địa chỉ URL
            const urlParams = new URLSearchParams(window.location.search);
            const documentId = urlParams.get('id');

            // Bẫy lỗi: Nếu truy cập file mà không có ID
            if (!documentId) {
                displayArea.innerHTML = "<h2 style='text-align:center; color:#ff5e6c;'>Không tìm thấy mã truyện!</h2>";
                return;
            }

            try {
                // Trỏ đích danh tới vị trí object trong CSDL
                const docRef = doc(db, "novels", documentId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const storyData = docSnap.data();

                    // Render HTML
                    displayArea.innerHTML = `
                        <div class="story-header">
                            <h1 class="story-title">${storyData.title}</h1>
                            <p class="story-author">Tác giả/Dịch giả: ${storyData.author}</p>
                        </div>
                        <div class="story-content">${storyData.content}</div>
                    `;
                    // Cập nhật lại tiêu đề Tab trình duyệt
                    document.title = storyData.title + " - Mã Đề 0099";
                } else {
                    displayArea.innerHTML = "<h2 style='text-align:center; color:#ff5e6c;'>Truyện đã bị xóa hoặc không tồn tại!</h2>";
                }
            } catch (error) {
                console.error("Lỗi trích xuất dữ liệu:", error);
                displayArea.innerHTML = "<h2 style='text-align:center; color:#ff5e6c;'>Lỗi kết nối máy chủ.</h2>";
            }
        }

        // Thực thi method
        renderStoryDetail();
    </script>
</body>

</html>
