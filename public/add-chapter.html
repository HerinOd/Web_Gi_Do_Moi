<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chương - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(91, 163, 224, 0.07) 0%, transparent 65%),
                var(--bg-base);
        }

        .settings-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 96px 20px 60px;
        }

        .settings-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 18px;
            font-size: 13px;
        }

        .settings-breadcrumb a {
            color: var(--text-2);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .settings-breadcrumb a:hover { color: var(--accent); }
        .settings-breadcrumb svg { width: 15px; height: 15px; }

        .admin-container {
            padding: 36px 40px 32px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            animation: fadeSlideUp 0.4s var(--ease) both;
        }

        @media (max-width: 480px) {
            .admin-container { padding: 26px 20px 24px; }
        }

        .form-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 26px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-2);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .form-row { display: flex; gap: 20px; }

        @media (max-width: 560px) {
            .form-row { flex-direction: column; gap: 0; }
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 400px;
            line-height: 1.7;
        }

        .input-icon-wrap { position: relative; }

        .input-icon-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: var(--text-3);
            pointer-events: none;
        }

        .input-icon-wrap input { padding-left: 38px !important; }

        .submit-btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: var(--accent);
            color: #121a28;
            border: none;
            font-weight: 700;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: var(--radius-sm);
            margin-top: 6px;
            transition: background 0.2s var(--ease), transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
        }

        .submit-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

        .submit-btn:hover {
            background: var(--accent-dark);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #auth-warning {
            display: none;
            text-align: center;
            color: var(--text-2);
            padding: 50px 20px;
        }

        #auth-warning h2 { color: var(--text-1); font-size: 18px; font-weight: 700; margin-bottom: 14px; }
        #auth-warning a { color: var(--accent); text-decoration: none; font-weight: 600; }
        #auth-warning a:hover { text-decoration: underline; }

        #perm-warning {
            display: none;
            text-align: center;
            padding: 8px 4px 4px;
        }

        .perm-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .perm-icon svg { width: 28px; height: 28px; }

        #perm-warning h2 { color: var(--text-1); font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        #perm-warning p { color: var(--text-2); line-height: 1.7; font-size: 14px; margin-bottom: 20px; }
        #perm-warning p b { color: var(--text-1); }

        .perm-back-link {
            display: inline-block;
            color: var(--accent);
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }

        .perm-back-link:hover { text-decoration: underline; }

        #add-chapter-form { display: none; }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="settings-wrapper">
        <div class="settings-breadcrumb">
            <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Về trang chủ</a>
        </div>

        <div class="admin-container">
            <div id="auth-warning">
                <h2>Vui lòng đăng nhập để sử dụng tính năng này!</h2>
                <a href="login.html">Đi tới đăng nhập →</a>
            </div>

            <div id="perm-warning">
                <div class="perm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15v2M12 7v4M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div>
                <h2>Bạn chưa có quyền đăng chương</h2>
                <p>Tính năng này chỉ dành cho <b>Dịch Giả</b> và <b>Admin</b>.</p>
                <a href="index.html" class="perm-back-link">Quay về trang chủ →</a>
            </div>

            <form id="add-chapter-form">
                <h2 id="form-title" class="form-title">Thêm chương mới</h2>

                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label for="chapterNumber">Số thứ tự chương</label>
                        <input type="number" id="chapterNumber" placeholder="VD: 1, 2, 3..." required min="1" step="any">
                    </div>
                    <div class="form-group" style="flex: 3;">
                        <label for="chapterTitle">Tiêu đề chương (tùy chọn)</label>
                        <input type="text" id="chapterTitle" placeholder="Nhập tên chương...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="chapterPassword">Mật khẩu (tùy chọn — để trống nếu muốn công khai)</label>
                    <div class="input-icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="text" id="chapterPassword" placeholder="Nhập mật mã để khóa chương này...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">Nội dung chương</label>
                    <textarea id="content" placeholder="Nhập nội dung chương vào đây..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    Đăng chương
                </button>
            </form>
        </div>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Đọc tham số URL
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('storyId');
        const editId = urlParams.get('editId');
        const isEditMode = !!editId;

        let currentUserId = null;
        let currentUserData = null;
        let parentStoryId = storyId; // Dùng để định tuyến quay về trang truyện

        // Bẫy lỗi URL
        if (!storyId && !editId) {
            showToast("Lỗi truy cập: Không xác định được mã truyện hoặc chương!", "error");
            setTimeout(() => { window.location.href = "index.html"; }, 1500);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userSnap = await getDoc(doc(db, "users", currentUserId));
                if (userSnap.exists()) currentUserData = userSnap.data();

                document.getElementById('auth-warning').style.display = 'none';

                // Kiểm tra quyền: chỉ Admin hoặc Dịch Giả mới được đăng chương
                const role = currentUserData ? currentUserData.role : "user";
                const canUpload = (role === "admin" || role === "translator");

                if (!canUpload) {
                    document.getElementById('add-chapter-form').style.display = 'none';
                    document.getElementById('perm-warning').style.display = 'block';
                    return;
                }

                document.getElementById('perm-warning').style.display = 'none';
                document.getElementById('add-chapter-form').style.display = 'block';

                if (isEditMode) initEditMode();
            } else {
                document.getElementById('add-chapter-form').style.display = 'none';
                document.getElementById('perm-warning').style.display = 'none';
                document.getElementById('auth-warning').style.display = 'block';
            }
        });

        async function initEditMode() {
            document.getElementById('form-title').textContent = "Sửa nội dung chương";
            setSubmitLabel("Lưu thay đổi");

            try {
                const chapterSnap = await getDoc(doc(db, "chapters", editId));
                if (!chapterSnap.exists()) {
                    showToast("Chương không tồn tại!", "error");
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                    return;
                }

                const chapData = chapterSnap.data();
                parentStoryId = chapData.storyId; // Cập nhật ID truyện gốc để dùng lúc submit xong

                // Kiểm tra quyền (Auth Guard) bằng cách chọc vào object Truyện mẹ
                const storySnap = await getDoc(doc(db, "stories", parentStoryId));
                if (storySnap.exists()) {
                    const storyData = storySnap.data();
                    if (storyData.uploaderId !== currentUserId && currentUserData.role !== "admin") {
                        showToast("Lỗi Phân Quyền: Bạn không có quyền sửa chương này!", "error");
                        setTimeout(() => { window.location.href = `info.html?id=${parentStoryId}`; }, 1500);
                        return;
                    }
                }

                // Điền data cũ vào Form
                document.getElementById('chapterNumber').value = chapData.chapterNumber;
                document.getElementById('chapterTitle').value = chapData.title || "";
                document.getElementById('chapterPassword').value = chapData.password || ""; // Nạp Mật khẩu cũ nếu có
                document.getElementById('content').value = chapData.content;
            } catch (error) {
                console.error("Lỗi: ", error);
            }
        }

        const SUBMIT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>';
        function setSubmitLabel(text, withIcon) {
            document.getElementById('submitBtn').innerHTML = (withIcon === false ? '' : SUBMIT_ICON) + text;
        }

        const form = document.getElementById('add-chapter-form');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUserId) return;

            setSubmitLabel("Đang xử lý...", false);
            submitBtn.disabled = true;

            try {
                // Đóng gói Object Model (bổ sung thuộc tính password)
                const chapObject = {
                    chapterNumber: parseFloat(document.getElementById('chapterNumber').value),
                    title: document.getElementById('chapterTitle').value.trim(),
                    password: document.getElementById('chapterPassword').value.trim(),
                    content: document.getElementById('content').value
                };

                if (isEditMode) {
                    // CẬP NHẬT
                    await updateDoc(doc(db, "chapters", editId), chapObject);
                    showToast("Cập nhật chương thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = `read.html?chapterId=${editId}`; // Trả về trang đọc
                } else {
                    // TẠO MỚI
                    chapObject.storyId = storyId; // Gắn Khóa ngoại (Foreign Key)
                    chapObject.createdAt = new Date().toISOString();
                    const docRef = await addDoc(collection(db, "chapters"), chapObject);
                    showToast("Đăng chương thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = `read.html?chapterId=${docRef.id}`;
                }
            } catch (error) {
                console.error("Lỗi: ", error);
                showToast("Đã xảy ra lỗi, vui lòng xem Console.", "error");
                setSubmitLabel(isEditMode ? "Lưu thay đổi" : "Đăng chương");
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
