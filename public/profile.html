<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== PROFILE HEADER ===== */
        .profile-header {
            max-width: 1200px;
            margin: 72px auto 28px;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 40px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
            position: relative;
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 600px) {
            .profile-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 28px 20px;
            }

            .profile-actions {
                width: 100%;
                max-width: 280px;
                margin-top: 4px;
            }
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 0 5px var(--accent-dim);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .profile-role {
            display: inline-block;
            background: var(--bg-hover);
            color: var(--text-2);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }

        .profile-role.admin {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-glow);
        }

        .profile-role.translator {
            background: rgba(91, 163, 224, 0.12);
            color: #5ba3e0;
            border-color: rgba(91, 163, 224, 0.4);
        }

        .role-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn-role {
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: opacity 0.2s;
        }

        .btn-role:hover { opacity: 0.85; }
        .btn-role:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-role.promote {
            background: rgba(91, 163, 224, 0.15);
            color: #5ba3e0;
            border-color: rgba(91, 163, 224, 0.4);
        }

        .btn-role.demote {
            background: var(--bg-hover);
            color: var(--text-2);
        }

        .profile-bio {
            color: var(--text-2);
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 14px;
        }

        /* ===== CỤM NÚT HÀNH ĐỘNG TRÊN HỒ SƠ ===== */
        .profile-actions {
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 168px;
        }

        .profile-actions.show { display: flex; }

        /* Nút hành động dùng chung: cùng kích cỡ, canh giữa, bo tròn đều */
        .profile-actions a,
        .profile-actions button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--border);
            transition: background 0.2s var(--ease), color 0.2s, opacity 0.2s;
        }

        .btn-edit-profile {
            background: var(--bg-hover);
            color: var(--text-2);
        }

        .btn-edit-profile:hover {
            background: var(--blue);
            color: #121a28;
            border-color: var(--blue);
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px 14px;
            color: var(--text-1);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .section-title.blue-accent::before {
            background: var(--blue);
        }

        /* ===== GRID 5 CỘT ===== */
        .post-grid-layout {
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 18px;
        }

        @media (max-width: 900px) {
            .post-grid-layout {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .post-grid-layout {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }

        /* ===== CARDS (đồng bộ trang chủ) ===== */
        .grid-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
            display: flex;
            flex-direction: column;
        }

        .grid-item:hover {
            transform: translateY(-7px);
            border-color: var(--accent);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--accent-glow);
        }

        .post-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            height: 100%;
            color: inherit;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 11px;
            font-size: 11px;
            border-bottom: 1px solid var(--border-muted);
        }

        .card-uploader {
            display: flex;
            align-items: center;
            gap: 7px;
            overflow: hidden;
        }

        .card-uploader img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-uploader-name {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .card-date {
            color: var(--text-3);
            white-space: nowrap;
        }

        .post-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 133%;
            overflow: hidden;
            background: var(--bg-hover);
        }

        .post-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s var(--ease);
        }

        .grid-item:hover .post-thumbnail img {
            transform: scale(1.06);
        }

        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 9px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            z-index: 2;
            backdrop-filter: blur(4px);
        }

        .status-ongoing {
            background: rgba(61, 220, 132, 0.85);
        }

        .status-completed {
            background: rgba(91, 163, 224, 0.85);
        }

        .status-paused {
            background: rgba(255, 94, 108, 0.85);
        }

        .tags-overlay {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            z-index: 2;
        }

        .tag-badge {
            background: rgba(65, 84, 93, 0.9);
            color: #dbe6ec;
            padding: 2px 7px;
            border-radius: var(--radius-xs);
            font-size: 10px;
            font-weight: 700;
            backdrop-filter: blur(4px);
        }

        .tag-badge.plus-tag {
            background: rgba(91, 163, 224, 0.9);
            color: #121a28;
        }

        .thumbnail-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(0deg, rgba(18, 26, 40, 0.92) 0%, transparent 100%);
            z-index: 1;
        }

        .post-title {
            padding: 11px 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            padding: 9px 12px;
            color: var(--text-2);
            border-top: 1px solid var(--border-muted);
            font-size: 12px;
            background: var(--bg-surface);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
        }

        /* ===== NÚT THÔNG BÁO ADMIN ===== */
        .btn-announce {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-glow) !important;
        }

        .btn-announce:hover {
            background: var(--accent);
            color: #121a28;
        }

        /* ===== MODAL THÔNG BÁO ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-1);
        }

        .modal-box textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-1);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 110px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .modal-box textarea:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-modal-cancel {
            padding: 9px 18px;
            background: var(--bg-hover);
            color: var(--text-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-modal-post {
            padding: 9px 18px;
            background: var(--accent);
            color: #121a28;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-modal-post:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== ĐĂNG KÝ DỊCH GIẢ ===== */
        .btn-apply {
            margin-top: 14px;
            padding: 10px 18px;
            background: rgba(91, 163, 224, 0.15);
            color: #5ba3e0;
            border: 1px solid rgba(91, 163, 224, 0.4);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-apply:hover { opacity: 0.85; }

        .apply-pending {
            margin-top: 14px;
            display: inline-block;
            padding: 8px 16px;
            background: var(--bg-hover);
            color: var(--text-2);
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
        }

        /* ===== HÒM THƯ ĐƠN DỊCH GIẢ ===== */
        .btn-inbox {
            background: rgba(91, 163, 224, 0.15);
            color: #5ba3e0;
            border-color: rgba(91, 163, 224, 0.4) !important;
        }

        .btn-inbox:hover { opacity: 0.85; }

        .inbox-badge {
            display: inline-block;
            min-width: 18px;
            padding: 0 5px;
            margin-left: 4px;
            background: var(--red, #ff5e6c);
            color: #fff;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            line-height: 18px;
        }


        #requests-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .request-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
        }

        .request-card img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .request-info { flex: 1; min-width: 0; }
        .request-name { font-weight: 700; color: var(--text-1); }
        .request-reason { color: var(--text-2); font-size: 13px; margin-top: 2px; line-height: 1.5; }

        .request-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-req {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            white-space: nowrap;
            border: 1px solid var(--border);
        }

        .btn-req:hover { opacity: 0.85; }
        .btn-req:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-req.view {
            background: var(--accent);
            color: #121a28;
            border-color: var(--accent);
        }

        .btn-req.reject {
            background: var(--bg-hover);
            color: var(--red, #ff5e6c);
        }

        @media (max-width: 560px) {
            .request-card { flex-wrap: wrap; }
            .request-actions { width: 100%; }
            .btn-req { flex: 1; text-align: center; }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="profile-header">
        <div class="profile-card" id="profile-block">
            <p style="color: var(--text-2); width: 100%; text-align: center;">Đang tải hồ sơ...</p>
        </div>
    </div>

    <div class="section-title">TRUYỆN ĐÃ ĐĂNG TẢI</div>
    <div class="post-grid-layout" id="user-stories-grid">
        <p style="text-align: center; width: 100%; color: var(--text-2); grid-column: 1/-1;">Đang tải...</p>
    </div>

    <div class="section-title blue-accent" id="bookmark-title" style="display: none; margin-top: 16px;">TRUYỆN ĐÃ LƯU
    </div>
    <div class="post-grid-layout" id="bookmark-grid" style="display: none;">
        <p style="text-align: center; width: 100%; color: #9aa7bc;">Đang tải danh sách lưu...</p>
    </div>

    <div class="modal-overlay" id="requests-modal">
        <div class="modal-box" style="max-width: 600px;">
            <div class="modal-title">📬 Đơn Xin Làm Dịch Giả <span id="requests-count"></span></div>
            <div id="requests-list"></div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="btn-close-requests">Đóng</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="announce-modal">
        <div class="modal-box">
            <div class="modal-title">📢 Đăng Thông Báo Mới</div>
            <textarea id="announce-text" placeholder="Nhập nội dung thông báo..."></textarea>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="btn-cancel-announce">Hủy</button>
                <button class="btn-modal-post" id="btn-submit-announce">Đăng</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="apply-modal">
        <div class="modal-box">
            <div class="modal-title">✍️ Đăng Ký Làm Dịch Giả</div>
            <p style="color: var(--text-2); font-size: 13px; margin: 0;">Gửi đơn tới Admin để được cấp quyền đăng truyện. Bạn có thể ghi vài lời giới thiệu (không bắt buộc).</p>
            <textarea id="apply-reason" placeholder="VD: Mình muốn dịch truyện thể loại trinh thám, đã có kinh nghiệm..."></textarea>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="btn-cancel-apply">Hủy</button>
                <button class="btn-modal-post" id="btn-submit-apply">Gửi Đơn</button>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetUid = urlParams.get('uid');

        const profileBlock = document.getElementById('profile-block');
        const storiesGrid = document.getElementById('user-stories-grid');
        const bookmarkTitle = document.getElementById('bookmark-title');
        const bookmarkGrid = document.getElementById('bookmark-grid');

        let currentUser = null;

        if (!targetUid) {
            profileBlock.innerHTML = "<h2 style='color:#ff5e6c; width:100%; text-align:center;'>Không tìm thấy mã người dùng!</h2>";
            storiesGrid.innerHTML = "";
        } else {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                renderProfile();
            });
        }

        // ==========================================
        // MODULE: RENDER THẺ TRUYỆN DÙNG CHUNG (DRY PRINCIPLE)
        // ==========================================
        function generateStoryCardHTML(story, docId) {
            const dateStr = story.createdAt ? new Date(story.createdAt).toLocaleDateString('vi-VN') : 'N/A';

            let statusClass = 'status-ongoing';
            if (story.status === 'Hoàn Thành') statusClass = 'status-completed';
            if (story.status === 'Tạm Dừng') statusClass = 'status-paused';

            let tagsHTML = "";
            if (story.tags && Array.isArray(story.tags) && story.tags.length > 0) {
                const displayTags = story.tags.slice(0, 2);
                displayTags.forEach(tag => tagsHTML += `<span class="tag-badge">${tag}</span>`);
                if (story.tags.length > 2) tagsHTML += `<span class="tag-badge plus-tag">+${story.tags.length - 2}</span>`;
            }

            const uploaderName = story.uploaderName || "Ẩn danh";
            const uploaderAvatar = story.uploaderAvatar || "https://www.w3schools.com/howto/img_avatar.png";
            const viewCount = story.views || 0;
            const likeCount = story.likeCount || 0;

            return `
                <div class="grid-item">
                    <a href="info.html?id=${docId}" class="post-link">
                        <div class="card-header">
                            <div class="card-uploader">
                                <img src="${uploaderAvatar}" alt="Avatar">
                                <span class="card-uploader-name">${uploaderName}</span>
                            </div>
                            <div class="card-date">${dateStr}</div>
                        </div>
                        <div class="post-thumbnail">
                            <img src="${story.coverImage}" alt="Cover">
                            <div class="thumbnail-gradient"></div>
                            <div class="status-badge ${statusClass}">${story.status}</div>
                            <div class="tags-overlay">${tagsHTML}</div>
                        </div>
                        <h3 class="post-title">${story.title}</h3>
                        <div class="card-footer">
                            <div class="stat-item"><span style="font-size: 16px;">👁️</span> ${viewCount}</div>
                            <div class="stat-item"><span style="font-size: 14px;">❤️</span> ${likeCount}</div>
                        </div>
                    </a>
                </div>
            `;
        }

        // ==========================================
        // ADMIN: PHONG / GỠ QUYỀN DỊCH GIẢ
        // ==========================================
        function renderRoleControls(targetRole) {
            const wrap = document.createElement('div');
            wrap.className = 'role-actions';

            if (targetRole === 'translator') {
                wrap.innerHTML = `<button class="btn-role demote" id="btn-set-user">⬇️ Gỡ quyền Dịch Giả</button>`;
            } else {
                wrap.innerHTML = `<button class="btn-role promote" id="btn-set-translator">⬆️ Phong làm Dịch Giả</button>`;
            }
            document.getElementById('profile-info-block').appendChild(wrap);

            const promoteBtn = document.getElementById('btn-set-translator');
            const demoteBtn = document.getElementById('btn-set-user');
            if (promoteBtn) promoteBtn.addEventListener('click', () => changeRole('translator'));
            if (demoteBtn) demoteBtn.addEventListener('click', () => changeRole('user'));
        }

        async function changeRole(newRole) {
            const label = newRole === 'translator' ? 'phong làm Dịch Giả' : 'gỡ quyền Dịch Giả';
            const btn = document.querySelector('.btn-role');
            if (btn) { btn.disabled = true; btn.textContent = 'Đang xử lý...'; }
            try {
                await updateDoc(doc(db, "users", targetUid), { role: newRole });
                // Phong dịch giả xong thì dọn luôn đơn xin (nếu có) khỏi hòm thư
                if (newRole === 'translator') {
                    try { await deleteDoc(doc(db, "translatorRequests", targetUid)); } catch (_) {}
                }
                showToast(`Đã ${label} thành công!`, 'success');
                renderProfile();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
                if (btn) btn.disabled = false;
            }
        }

        // ==========================================
        // USER: ĐĂNG KÝ LÀM DỊCH GIẢ
        // ==========================================
        async function renderApplySection() {
            // Kiểm tra đã có đơn đang chờ chưa
            let pending = false;
            try {
                const reqSnap = await getDoc(doc(db, "translatorRequests", targetUid));
                pending = reqSnap.exists();
            } catch (_) {}

            const block = document.getElementById('profile-info-block');
            if (pending) {
                const tag = document.createElement('div');
                tag.className = 'apply-pending';
                tag.textContent = '⏳ Đơn xin làm dịch giả đang chờ duyệt';
                block.appendChild(tag);
            } else {
                const btn = document.createElement('button');
                btn.className = 'btn-apply';
                btn.textContent = '✍️ Đăng ký làm Dịch Giả';
                block.appendChild(btn);
                btn.addEventListener('click', () => {
                    document.getElementById('apply-reason').value = '';
                    document.getElementById('apply-modal').classList.add('open');
                });

                // Tự mở form đăng ký khi tới từ trang Đăng Truyện (?apply=1)
                if (urlParams.get('apply') === '1') {
                    document.getElementById('apply-reason').value = '';
                    document.getElementById('apply-modal').classList.add('open');
                }
            }
        }

        // ==========================================
        // ADMIN: HÒM THƯ ĐƠN XIN LÀM DỊCH GIẢ
        // ==========================================
        async function loadTranslatorRequests() {
            const list = document.getElementById('requests-list');
            try {
                const snap = await getDocs(collection(db, "translatorRequests"));

                // Tạo nút Hòm Thư trên khung hồ sơ (luôn hiện với admin)
                const inboxBtn = document.createElement('button');
                inboxBtn.className = 'btn-inbox';
                inboxBtn.innerHTML = snap.size > 0
                    ? `📬 Hòm Thư <span class="inbox-badge">${snap.size}</span>`
                    : `📬 Hòm Thư`;
                document.getElementById('profile-actions').appendChild(inboxBtn);
                inboxBtn.addEventListener('click', () => {
                    document.getElementById('requests-modal').classList.add('open');
                });

                document.getElementById('requests-count').textContent = snap.size > 0 ? `(${snap.size})` : '';

                if (snap.empty) {
                    list.innerHTML = `<p style="text-align:center; color:var(--text-2); padding:16px;">Chưa có đơn nào.</p>`;
                    return;
                }

                list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    const avatar = r.avatar || "https://www.w3schools.com/howto/img_avatar.png";
                    const reason = r.reason ? `<div class="request-reason">${r.reason}</div>` : `<div class="request-reason" style="font-style:italic; opacity:0.7;">(Không có lời nhắn)</div>`;
                    const card = document.createElement('div');
                    card.className = 'request-card';
                    card.innerHTML = `
                        <img src="${avatar}" alt="Avatar">
                        <div class="request-info">
                            <div class="request-name">${r.displayName || 'Người dùng'}</div>
                            ${reason}
                        </div>
                        <div class="request-actions">
                            <a href="profile.html?uid=${d.id}" class="btn-req view">Xem hồ sơ →</a>
                            <button class="btn-req reject" data-uid="${d.id}">Từ chối</button>
                        </div>
                    `;
                    list.appendChild(card);
                });

                list.querySelectorAll('.btn-req.reject').forEach(btn => {
                    btn.addEventListener('click', () => rejectRequest(btn.dataset.uid, btn));
                });
            } catch (e) { console.error("Lỗi tải hòm thư:", e); }
        }

        function updateInboxBadge() {
            const remaining = document.querySelectorAll('#requests-list .request-card').length;
            const badge = document.querySelector('.btn-inbox');
            if (badge) {
                badge.innerHTML = remaining > 0
                    ? `📬 Hòm Thư <span class="inbox-badge">${remaining}</span>`
                    : `📬 Hòm Thư`;
            }
            document.getElementById('requests-count').textContent = remaining > 0 ? `(${remaining})` : '';
            if (remaining === 0) {
                document.getElementById('requests-list').innerHTML = `<p style="text-align:center; color:var(--text-2); padding:16px;">Chưa có đơn nào.</p>`;
            }
        }

        async function rejectRequest(uid, btn) {
            btn.disabled = true;
            btn.textContent = 'Đang xóa...';
            try {
                await deleteDoc(doc(db, "translatorRequests", uid));
                showToast('Đã từ chối đơn.', 'success');
                btn.closest('.request-card').remove();
                updateInboxBadge();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Từ chối';
            }
        }

        async function renderProfile() {
            try {
                // 1. KÉO DỮ LIỆU PUBLIC USER
                const userRef = doc(db, "users", targetUid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    profileBlock.innerHTML = "<p style='color:var(--red); width:100%; text-align:center; font-weight:600;'>Người dùng không tồn tại!</p>";
                    storiesGrid.innerHTML = "";
                    return;
                }

                const userData = userSnap.data();
                const avatarUrl = userData.avatar || "https://www.w3schools.com/howto/img_avatar.png";
                const targetRole = userData.role || "user";

                // Nhãn + class hiển thị theo role
                let roleBadge = "USER", roleClass = "";
                if (targetRole === "admin") { roleBadge = "ADMIN"; roleClass = "admin"; }
                else if (targetRole === "translator") { roleBadge = "DỊCH GIẢ"; roleClass = "translator"; }

                const isAdmin = targetRole === "admin";
                profileBlock.innerHTML = `
                    <img src="${avatarUrl}" alt="Avatar" class="profile-avatar">
                    <div class="profile-info" id="profile-info-block">
                        <div class="profile-name">${userData.displayName}</div>
                        <div class="profile-role ${roleClass}">${roleBadge}</div>
                        <div class="profile-bio">${userData.bio || 'Không có gì sất...'}</div>
                    </div>
                    <div class="profile-actions" id="profile-actions">
                        <a href="settings.html" class="btn-edit-profile" id="btnEditProfile">✏️ Chỉnh sửa hồ sơ</a>
                    </div>
                `;
                document.title = `${userData.displayName} - Hồ Sơ - Mã Đề 0099`;

                // ADMIN ĐANG XEM HỒ SƠ NGƯỜI KHÁC -> Hiển thị nút phong/gỡ quyền Dịch Giả
                if (currentUser && currentUser.uid !== targetUid) {
                    try {
                        const viewerSnap = await getDoc(doc(db, "users", currentUser.uid));
                        const viewerRole = viewerSnap.exists() ? viewerSnap.data().role : "user";
                        if (viewerRole === "admin" && targetRole !== "admin") {
                            renderRoleControls(targetRole);
                        }
                    } catch (e) { console.error("Lỗi kiểm tra quyền admin:", e); }
                }

                // 2. KÉO DỮ LIỆU TRUYỆN ĐÃ ĐĂNG
                const storiesRef = collection(db, "stories");
                const q = query(storiesRef, where("uploaderId", "==", targetUid));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    storiesGrid.innerHTML = "<p style='text-align: center; width: 100%; color: #9aa7bc; grid-column: 1/-1;'>Người dùng này chưa đăng tải bộ truyện nào.</p>";
                } else {
                    storiesGrid.innerHTML = "";
                    querySnapshot.forEach((doc) => {
                        storiesGrid.innerHTML += generateStoryCardHTML(doc.data(), doc.id);
                    });
                }

                // 3. LOGIC XỬ LÝ QUYỀN RIÊNG TƯ (BOOKMARK CROSS-QUERY)
                if (currentUser && currentUser.uid === targetUid) {
                    // Xem hồ sơ của chính mình -> hiện cụm nút hành động
                    document.getElementById('profile-actions').classList.add('show');

                    if (isAdmin) {
                        const announceBtn = document.createElement('button');
                        announceBtn.className = 'btn-announce';
                        announceBtn.innerHTML = '📢 Thông Báo';
                        document.getElementById('profile-actions').appendChild(announceBtn);
                        announceBtn.addEventListener('click', () => {
                            document.getElementById('announce-text').value = '';
                            document.getElementById('announce-modal').classList.add('open');
                        });

                        // Admin xem hồ sơ mình -> tải hòm thư đơn xin làm dịch giả
                        loadTranslatorRequests();
                    } else if (targetRole === 'user') {
                        // User thường xem hồ sơ mình -> nút Đăng ký làm dịch giả (hoặc trạng thái Đang chờ)
                        renderApplySection();
                    }

                    bookmarkTitle.style.display = 'flex';
                    bookmarkGrid.style.display = 'grid';

                    if (!userData.bookmarked || userData.bookmarked.length === 0) {
                        bookmarkGrid.innerHTML = "<p style='text-align: center; width: 100%; color: #9aa7bc; grid-column: 1/-1;'>Bạn chưa lưu bộ truyện nào.</p>";
                    } else {
                        bookmarkGrid.innerHTML = "";
                        const fetchPromises = userData.bookmarked.map(storyId => getDoc(doc(db, "stories", storyId)));
                        const storySnaps = await Promise.all(fetchPromises);

                        storySnaps.forEach(snap => {
                            if (snap.exists()) {
                                bookmarkGrid.innerHTML += generateStoryCardHTML(snap.data(), snap.id);
                            }
                        });
                    }
                }
            } catch (error) {
                console.error("Lỗi:", error);
                profileBlock.innerHTML = "<h2 style='color:#ff5e6c; width:100%; text-align:center;'>Lỗi kết nối máy chủ!</h2>";
            }
        }

        // ===== MODAL THÔNG BÁO =====
        const announceModal = document.getElementById('announce-modal');
        document.getElementById('btn-cancel-announce').addEventListener('click', () => {
            announceModal.classList.remove('open');
        });
        announceModal.addEventListener('click', (e) => {
            if (e.target === announceModal) announceModal.classList.remove('open');
        });
        document.getElementById('btn-submit-announce').addEventListener('click', async () => {
            const text = document.getElementById('announce-text').value.trim();
            if (!text) return;
            const submitBtn = document.getElementById('btn-submit-announce');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang đăng...';
            try {
                await setDoc(doc(db, "config", "announcement"), {
                    message: text,
                    createdAt: new Date().toISOString(),
                    createdBy: currentUser.uid
                });
                announceModal.classList.remove('open');
                showToast('Đã đăng thông báo thành công!', 'success');
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Đăng';
            }
        });

        // ===== MODAL HÒM THƯ ĐƠN DỊCH GIẢ =====
        const requestsModal = document.getElementById('requests-modal');
        document.getElementById('btn-close-requests').addEventListener('click', () => {
            requestsModal.classList.remove('open');
        });
        requestsModal.addEventListener('click', (e) => {
            if (e.target === requestsModal) requestsModal.classList.remove('open');
        });

        // ===== MODAL ĐĂNG KÝ DỊCH GIẢ =====
        const applyModal = document.getElementById('apply-modal');
        document.getElementById('btn-cancel-apply').addEventListener('click', () => {
            applyModal.classList.remove('open');
        });
        applyModal.addEventListener('click', (e) => {
            if (e.target === applyModal) applyModal.classList.remove('open');
        });
        document.getElementById('btn-submit-apply').addEventListener('click', async () => {
            if (!currentUser) return;
            const reason = document.getElementById('apply-reason').value.trim();
            const submitBtn = document.getElementById('btn-submit-apply');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang gửi...';
            try {
                // Lấy tên/avatar mới nhất từ hồ sơ để hiển thị trong hòm thư admin
                const meSnap = await getDoc(doc(db, "users", currentUser.uid));
                const me = meSnap.exists() ? meSnap.data() : {};
                await setDoc(doc(db, "translatorRequests", currentUser.uid), {
                    uid: currentUser.uid,
                    displayName: me.displayName || "Người dùng",
                    avatar: me.avatar || "",
                    reason: reason,
                    createdAt: new Date().toISOString()
                });
                applyModal.classList.remove('open');
                showToast('Đã gửi đơn! Vui lòng chờ Admin duyệt.', 'success');
                renderProfile();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Gửi Đơn';
            }
        });
    </script>
</body>

</html>
