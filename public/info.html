<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Truyện - tên web</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .info-container {
            max-width: 900px;
            margin: 82px auto 24px;
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-md);
        }

        .cover-wrapper {
            flex: 1;
            min-width: 200px;
            max-width: 260px;
        }

        .cover-wrapper img {
            width: 100%;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
        }

        .meta-wrapper { flex: 2; min-width: 280px; }

        .story-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .meta-item {
            margin-bottom: 10px;
            color: var(--text-2);
            font-size: 15px;
        }

        .meta-item span { color: var(--text-1); font-weight: 600; }

        .meta-item a { color: var(--blue); text-decoration: none; }
        .meta-item a:hover { text-decoration: underline; }

        .tag-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

        .tag-bubble {
            background: var(--bg-hover);
            color: var(--accent);
            padding: 5px 13px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: background 0.2s;
        }

        .tag-bubble:hover { background: var(--accent-dim); }

        .action-bars {
            margin-top: 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s var(--ease), transform 0.15s, box-shadow 0.2s;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-read {
            background: var(--accent);
            color: #0e0e16;
        }
        .btn-read:hover { background: var(--accent-dark); box-shadow: 0 4px 16px var(--accent-glow); }

        .btn-edit { background: var(--blue); color: #0e0e16; display: none; }

        /* ===== SECTIONS ===== */
        .description-section,
        .chapter-section,
        .comment-section {
            max-width: 900px;
            margin: 0 auto 20px;
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .description-content {
            color: var(--text-1);
            line-height: 1.85;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .chapter-section { margin-bottom: 20px; }
        .comment-section { margin-bottom: 50px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .chapter-list { list-style: none; padding: 0; }

        .chapter-item {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: var(--radius-xs);
            transition: background 0.2s;
        }

        .chapter-item:hover { background: var(--bg-hover); }

        .chapter-item a {
            color: var(--text-1);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .chapter-item a:hover { color: var(--accent); }

        .chapter-date { color: var(--text-3); font-size: 13px; white-space: nowrap; }

        /* ===== COMMENT FORM ===== */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .comment-form textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            padding: 12px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .comment-form textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-dim);
        }

        .comment-form button {
            align-self: flex-end;
            padding: 9px 22px;
            background: var(--blue);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            font-size: 14px;
            font-family: inherit;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .comment-form button:hover { background: var(--blue-hover, #3388dd); transform: translateY(-1px); }

        /* ===== COMMENTS ===== */
        .comment-item { display: flex; gap: 14px; margin-bottom: 20px; }
        .comment-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

        .comment-body {
            flex: 1;
            background: var(--bg-hover);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-muted);
        }

        .comment-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .comment-author { font-weight: 700; color: var(--accent); }
        .comment-time { font-size: 12px; color: var(--text-3); }

        .comment-text {
            color: var(--text-1);
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .comment-actions { display: flex; gap: 14px; font-size: 13px; }

        .action-btn { color: var(--text-3); cursor: pointer; transition: color 0.2s; user-select: none; font-weight: 500; }
        .action-btn:hover { color: var(--blue); }
        .action-btn.delete:hover { color: var(--red); }
        .action-btn.liked { color: var(--accent); font-weight: 700; }

        .replies-container {
            margin-left: 56px;
            border-left: 2px solid var(--border);
            padding-left: 16px;
        }

        .reply-input-box { display: none; margin-top: 10px; gap: 10px; }

        .reply-input-box input {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--blue);
            color: var(--text-1);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        .reply-input-box button {
            padding: 8px 16px;
            background: var(--accent);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .reply-input-box button:hover { background: var(--accent-dark); }

        .comment-edit-box { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }

        .comment-edit-box textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--accent);
            color: var(--text-1);
            padding: 10px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            outline: none;
        }

        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .edit-actions button {
            padding: 7px 14px;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save-edit { background: var(--accent); color: #0e0e16; }
        .btn-save-edit:hover { background: var(--accent-dark); }

        .btn-cancel-edit {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border) !important;
        }

        .btn-cancel-edit:hover { border-color: var(--text-2) !important; }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">tên web</a>
        </div>
    </header>

    <div class="info-container" id="story-info-block">
        <h2 style="color: #aaa; width: 100%; text-align: center;">Đang trích xuất dữ liệu...</h2>
    </div>

    <div class="description-section" id="story-desc-block" style="display: none;">
        <div class="section-header">
            <h3 style="color: #ffaa00; margin: 0;">TÓM TẮT NỘI DUNG</h3>
        </div>
        <div class="description-content" id="desc-text-content"></div>
    </div>

    <div class="chapter-section">
        <div class="section-header">
            <h3 style="color: #ffaa00; margin: 0;">DANH SÁCH CHƯƠNG</h3>
            <a href="#" class="btn btn-edit" id="btnAddChapter">Thêm Chương Mới</a>
        </div>
        <ul class="chapter-list" id="chapter-list-block">
            <li style="color: #aaa; text-align: center;">Hệ thống đang tải danh sách chương...</li>
        </ul>
    </div>

    <div class="comment-section">
        <div class="section-header">
            <h3 style="color: #ffaa00; margin: 0;">BÌNH LUẬN</h3>
        </div>

        <div id="comment-auth-warning" style="text-align: center; color: #ff5555; padding: 20px 0;">
            Vui lòng <a href="login.html" style="color: #ffaa00;">đăng nhập</a> để bình luận.
        </div>
        <form class="comment-form" id="main-comment-form" style="display: none;">
            <textarea id="main-comment-text" placeholder="Bạn nghĩ gì về bộ truyện này?" required></textarea>
            <button type="submit" id="btnSubmitComment">Gửi Bình Luận</button>
        </form>

        <div id="comment-list-block">
            <p style="color: #aaa; text-align: center;">Đang tải bình luận...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');

        let currentStoryData = null;
        let currentUser = null;
        let currentUserData = null;

        function updateBookmarkUI() {
            const btnBookmark = document.getElementById('btnBookmark');
            if (btnBookmark && currentUserData) {
                if (currentUserData.bookmarked && currentUserData.bookmarked.includes(storyId)) {
                    btnBookmark.textContent = "Bỏ Lưu Truyện";
                    btnBookmark.style.background = "#ff5555";
                    btnBookmark.style.color = "#121218";
                } else {
                    btnBookmark.textContent = "Lưu Truyện";
                    btnBookmark.style.background = "#2a2a35";
                    btnBookmark.style.color = "#e0e0e0";
                }
            }
        }

        async function checkPermissions() {
            if (currentUser && currentStoryData && currentUserData) {
                if (currentUserData.role === "admin" || currentUser.uid === currentStoryData.uploaderId) {
                    const btnAddChapter = document.getElementById('btnAddChapter');
                    btnAddChapter.style.display = 'inline-block';
                    btnAddChapter.href = `add-chapter.html?storyId=${storyId}`;
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    document.getElementById('comment-auth-warning').style.display = 'none';
                    document.getElementById('main-comment-form').style.display = 'flex';
                    updateBookmarkUI();

                    const btnLike = document.getElementById('btnLikeStory');
                    if (btnLike && currentStoryData && currentStoryData.likedBy && currentStoryData.likedBy.includes(user.uid)) {
                        btnLike.textContent = "Đã Thích";
                        btnLike.style.background = "#ff5555";
                        btnLike.style.color = "#121218";
                    }
                }
            } else {
                currentUserData = null;
                document.getElementById('comment-auth-warning').style.display = 'block';
                document.getElementById('main-comment-form').style.display = 'none';
            }
            checkPermissions();
        });

        async function renderStoryInfo() {
            const infoBlock = document.getElementById('story-info-block');
            const descBlock = document.getElementById('story-desc-block');
            const descTextContent = document.getElementById('desc-text-content');

            if (!storyId) { infoBlock.innerHTML = "<h2 style='color:#ff5555; width:100%; text-align:center;'>Không tìm thấy mã truyện!</h2>"; return; }

            try {
                const storyRef = doc(db, "stories", storyId);
                const storySnap = await getDoc(storyRef);
                if (!storySnap.exists()) { infoBlock.innerHTML = "<h2 style='color:#ff5555; width:100%; text-align:center;'>Truyện đã bị xóa!</h2>"; return; }
                currentStoryData = storySnap.data();

                let firstChapterUrl = "#";
                const chaptersRef = collection(db, "chapters");
                const q = query(chaptersRef, where("storyId", "==", storyId));
                const querySnapshot = await getDocs(q);
                let chaptersArray = [];
                querySnapshot.forEach((doc) => { chaptersArray.push({ id: doc.id, ...doc.data() }); });

                if (chaptersArray.length > 0) {
                    chaptersArray.sort((a, b) => a.chapterNumber - b.chapterNumber);
                    firstChapterUrl = `read.html?chapterId=${chaptersArray[0].id}`;
                }

                let translatorName = "Ẩn danh";
                if (currentStoryData.uploaderId) {
                    const userSnap = await getDoc(doc(db, "users", currentStoryData.uploaderId));
                    if (userSnap.exists()) translatorName = userSnap.data().displayName;
                }

                let tagsHTML = '';
                if (currentStoryData.tags && Array.isArray(currentStoryData.tags)) {
                    currentStoryData.tags.forEach(tag => tagsHTML += `<span class="tag-bubble">${tag}</span>`);
                }

                let isLiked = false;
                if (currentUser && currentStoryData.likedBy && currentStoryData.likedBy.includes(currentUser.uid)) {
                    isLiked = true;
                }
                const likeCountDisplay = currentStoryData.likeCount || 0;

                infoBlock.innerHTML = `
                    <div class="cover-wrapper"><img src="${currentStoryData.coverImage}" alt="Cover"></div>
                    <div class="meta-wrapper">
                        <h1 class="story-title">${currentStoryData.title}</h1>
                        <div class="meta-item">Tác giả gốc: <span>${currentStoryData.originalAuthor || 'Đang cập nhật'}</span></div>
                        <div class="meta-item">Trạng thái: <span>${currentStoryData.status}</span></div>
                        <div class="meta-item">Dịch giả: <a href="profile.html?uid=${currentStoryData.uploaderId}">${translatorName}</a></div>
                        
                        <div class="meta-item" style="margin-top: 15px; color: #ffaa00;">
                            Lượt xem: <span>${currentStoryData.views}</span> &nbsp;|&nbsp; Lượt thích: <span id="like-count-display">${likeCountDisplay}</span>
                        </div>

                        <div class="tag-list">${tagsHTML}</div>
                        
                        <div class="action-bars">
                            <a href="${firstChapterUrl}" class="btn btn-read" ${chaptersArray.length === 0 ? 'style="opacity: 0.5; pointer-events: none;"' : ''}>Bắt đầu đọc</a>
                            <button class="btn" id="btnLikeStory" style="background: ${isLiked ? '#ff5555' : '#2a2a35'}; color: ${isLiked ? '#121218' : '#e0e0e0'};">
                                ${isLiked ? 'Đã Thích' : 'Thích Truyện'}
                            </button>
                            <a href="#" class="btn" id="btnBookmark" style="background: #2a2a35; color: #e0e0e0;">Lưu Truyện</a>
                            
                            <a href="add-story.html?editId=${storyId}" class="btn" style="background: #4da6ff; color: #121218; display: ${(currentUserData && (currentUserData.role === 'admin' || currentUser.uid === currentStoryData.uploaderId)) ? 'inline-block' : 'none'};">Sửa Thông Tin</a>
                            <button class="btn" id="btnDeleteStory" data-story-id="${storyId}" style="background: #ff5555; color: #121218; display: ${(currentUserData && (currentUserData.role === 'admin' || currentUser.uid === currentStoryData.uploaderId)) ? 'inline-block' : 'none'};">Xóa Truyện</button>
                        </div>
                    </div>
                `;

                const descText = currentStoryData.description || "Chưa có mô tả cho bộ truyện này.";
                descTextContent.textContent = descText;
                descBlock.style.display = 'block';

                document.title = currentStoryData.title + " - tên web";
                checkPermissions();
                updateBookmarkUI();

                const chapterListBlock = document.getElementById('chapter-list-block');
                if (chaptersArray.length === 0) {
                    chapterListBlock.innerHTML = `<li style="color: #aaa; text-align: center;">Chưa có chương nào được đăng tải.</li>`;
                } else {
                    chapterListBlock.innerHTML = "";
                    chaptersArray.forEach(chap => {
                        const dateString = new Date(chap.createdAt).toLocaleDateString('vi-VN');
                        chapterListBlock.innerHTML += `
                            <li class="chapter-item">
                                <a href="read.html?chapterId=${chap.id}">Chương ${chap.chapterNumber}${chap.title ? ': ' + chap.title : ''}</a>
                                <span class="chapter-date">${dateString}</span>
                            </li>
                        `;
                    });
                }

                loadComments();
            } catch (error) {
                console.error(error);
                infoBlock.innerHTML = "<h2 style='color:#ff5555; width:100%; text-align:center;'>Lỗi kết nối CSDL!</h2>";
            }
        }

        const infoBlock = document.getElementById('story-info-block');
        infoBlock.addEventListener('click', async (e) => {
            if (e.target.id === 'btnBookmark') {
                e.preventDefault();
                if (!currentUser || !currentUserData) { alert("Vui lòng đăng nhập để sử dụng tính năng Lưu truyện!"); return; }

                const userRef = doc(db, "users", currentUser.uid);
                const btn = e.target;
                btn.textContent = "Đang xử lý...";

                try {
                    if (!currentUserData.bookmarked) currentUserData.bookmarked = [];
                    const isBookmarked = currentUserData.bookmarked.includes(storyId);

                    if (isBookmarked) {
                        await updateDoc(userRef, { bookmarked: arrayRemove(storyId) });
                        currentUserData.bookmarked = currentUserData.bookmarked.filter(id => id !== storyId);
                    } else {
                        await updateDoc(userRef, { bookmarked: arrayUnion(storyId) });
                        currentUserData.bookmarked.push(storyId);
                    }
                    updateBookmarkUI();
                } catch (error) {
                    console.error("Lỗi khi lưu truyện:", error);
                    alert("Đã xảy ra lỗi hệ thống, vui lòng thử lại sau.");
                    updateBookmarkUI();
                }
            }

            if (e.target.id === 'btnLikeStory') {
                e.preventDefault();
                if (!currentUser) { alert("Vui lòng đăng nhập để Thích truyện!"); return; }

                const btn = e.target;
                btn.disabled = true;

                try {
                    const storyRef = doc(db, "stories", storyId);
                    if (!currentStoryData.likedBy) currentStoryData.likedBy = [];
                    const isLiked = currentStoryData.likedBy.includes(currentUser.uid);

                    if (isLiked) {
                        await updateDoc(storyRef, {
                            likedBy: arrayRemove(currentUser.uid),
                            likeCount: increment(-1)
                        });
                        currentStoryData.likedBy = currentStoryData.likedBy.filter(id => id !== currentUser.uid);
                        currentStoryData.likeCount = Math.max(0, (currentStoryData.likeCount || 0) - 1);
                        btn.textContent = "Thích Truyện";
                        btn.style.background = "#2a2a35";
                        btn.style.color = "#e0e0e0";
                    } else {
                        await updateDoc(storyRef, {
                            likedBy: arrayUnion(currentUser.uid),
                            likeCount: increment(1)
                        });
                        currentStoryData.likedBy.push(currentUser.uid);
                        currentStoryData.likeCount = (currentStoryData.likeCount || 0) + 1;
                        btn.textContent = "Đã Thích";
                        btn.style.background = "#ff5555";
                        btn.style.color = "#121218";
                    }
                    const likeDisplay = document.getElementById('like-count-display');
                    if (likeDisplay) likeDisplay.textContent = currentStoryData.likeCount;
                } catch (error) {
                    console.error("Lỗi khi like truyện:", error);
                    alert("Có lỗi xảy ra, vui lòng thử lại.");
                } finally {
                    btn.disabled = false;
                }
            }
        });

        document.addEventListener('click', async (e) => {
            if (e.target.id === 'btnDeleteStory') {
                e.preventDefault();
                if (!confirm("CẢNH BÁO ĐỎ: Bạn có chắc chắn muốn xóa TOÀN BỘ bộ truyện này? Tất cả chương và bình luận sẽ bị xóa vĩnh viễn và không thể khôi phục!")) return;

                const targetStoryId = e.target.getAttribute('data-story-id');
                e.target.textContent = "Đang dọn dẹp dữ liệu...";
                e.target.disabled = true;

                try {
                    const deletePromises = [];
                    const chaptersQuery = query(collection(db, "chapters"), where("storyId", "==", targetStoryId));
                    const chaptersSnap = await getDocs(chaptersQuery);

                    for (const chapDoc of chaptersSnap.docs) {
                        const chapId = chapDoc.id;
                        deletePromises.push(deleteDoc(doc(db, "chapters", chapId)));
                        const chapCmtQuery = query(collection(db, "comments"), where("targetId", "==", chapId));
                        const chapCmtSnap = await getDocs(chapCmtQuery);
                        chapCmtSnap.forEach(cmtSnap => {
                            deletePromises.push(deleteDoc(doc(db, "comments", cmtSnap.id)));
                        });
                    }

                    const storyCmtQuery = query(collection(db, "comments"), where("targetId", "==", targetStoryId));
                    const storyCmtSnap = await getDocs(storyCmtQuery);
                    storyCmtSnap.forEach(cmtSnap => {
                        deletePromises.push(deleteDoc(doc(db, "comments", cmtSnap.id)));
                    });

                    await Promise.all(deletePromises);
                    await deleteDoc(doc(db, "stories", targetStoryId));

                    alert("Đã xóa bộ truyện và toàn bộ dữ liệu phân tầng (Chương & Bình luận) thành công!");
                    window.location.href = "index.html";
                } catch (error) {
                    console.error("Lỗi xóa truyện:", error);
                    alert("Có lỗi xảy ra khi xóa truyện. Vui lòng kiểm tra Console (F12).");
                    e.target.textContent = "Xóa Truyện";
                    e.target.disabled = false;
                }
            }
        });

        const commentListBlock = document.getElementById('comment-list-block');

        // ==========================================
        // THUẬT TOÁN RENDER BÌNH LUẬN NÂNG CẤP
        // ==========================================
        function generateCommentHTML(c, isReply = false, parentComment = null) {
            const dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
            const avatar = c.avatar || "https://www.w3schools.com/howto/img_avatar.png";

            let actionBtnsHTML = "";
            if (currentUser && currentUserData) {
                if (currentUser.uid === c.userId) actionBtnsHTML += `<div class="action-btn" data-action="edit" data-id="${c.id}">Sửa</div>`;
                if (currentUser.uid === c.userId || currentUserData.role === 'admin') actionBtnsHTML += `<div class="action-btn delete" data-action="delete" data-id="${c.id}">Xóa</div>`;
            }

            let isLiked = false;
            let likeCount = c.likedBy ? c.likedBy.length : 0;
            if (currentUser && c.likedBy && c.likedBy.includes(currentUser.uid)) isLiked = true;

            const editedTag = c.isEdited ? `<span style="font-size: 11px; font-style: italic; color: #888; margin-left: 5px;">(đã chỉnh sửa)</span>` : "";
            const replyParentId = isReply ? c.parentId : c.id;

            // XÁC ĐỊNH MỤC TIÊU BỊ TAG
            const tagTargetName = c.displayName;
            const tagTargetUid = c.userId;

            let formattedContent = c.content;

            // THUẬT TOÁN ĐỊNH TUYẾN HYPERLINK (Ưu tiên Phi chuẩn hóa, dùng Fallback cho bản cũ)
            if (c.replyToName && c.replyToUid) {
                const tagString = `@${c.replyToName}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${c.replyToUid}" style="color: #4da6ff; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            } else if (isReply && parentComment) {
                const tagString = `@${parentComment.displayName}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${parentComment.userId}" style="color: #4da6ff; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            }

            return `
                <div class="comment-item" id="cmt-${c.id}">
                    <a href="profile.html?uid=${c.userId}">
                        <img src="${avatar}" alt="Avatar" class="comment-avatar" ${isReply ? 'style="width:35px; height:35px;"' : ''}>
                    </a>
                    <div class="comment-body" style="width: 100%;">
                        <div class="comment-header">
                            <div class="comment-author">
                                <a href="profile.html?uid=${c.userId}" style="color: #ffaa00; text-decoration: none;">${c.displayName}</a> ${editedTag}
                            </div>
                            <div class="comment-time">${dateStr}</div>
                        </div>
                        
                        <div class="comment-text" id="text-display-${c.id}">${formattedContent}</div>
                        
                        <div class="comment-edit-box" id="edit-box-${c.id}">
                            <textarea id="edit-input-${c.id}">${c.content}</textarea>
                            <div class="edit-actions">
                                <button class="btn-cancel-edit" data-action="cancel-edit" data-id="${c.id}">Hủy</button>
                                <button class="btn-save-edit" data-action="save-edit" data-id="${c.id}">Lưu thay đổi</button>
                            </div>
                        </div>

                        <div class="comment-actions">
                            <div class="action-btn ${isLiked ? 'liked' : ''}" data-action="like" data-id="${c.id}">
                                ${isLiked ? 'Đã Thích' : 'Thích'} (${likeCount})
                            </div>
                            <div class="action-btn" data-action="reply" data-id="${c.id}" data-parent-id="${replyParentId}" data-tag-name="${tagTargetName}" data-tag-uid="${tagTargetUid}">Phản hồi</div>
                            ${actionBtnsHTML}
                        </div>
                        
                        <div class="reply-input-box" id="reply-box-${c.id}">
                            <input type="text" id="reply-text-${c.id}" placeholder="Viết phản hồi...">
                            <button data-action="submit-reply" data-parent-id="${replyParentId}" data-box-id="${c.id}">Gửi</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadComments() {
            if (!storyId) return;
            try {
                const q = query(collection(db, "comments"), where("targetId", "==", storyId));
                const snap = await getDocs(q);
                let commentsArr = [];
                snap.forEach(doc => commentsArr.push({ id: doc.id, ...doc.data() }));

                commentsArr.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

                const parents = commentsArr.filter(c => c.parentId === null);
                const replies = commentsArr.filter(c => c.parentId !== null);

                if (commentsArr.length === 0) {
                    commentListBlock.innerHTML = "<p style='color: #aaa; text-align: center;'>Chưa có bình luận nào. Hãy là người đầu tiên!</p>";
                    return;
                }

                let html = "";
                parents.forEach(p => {
                    html += generateCommentHTML(p, false, null);
                    const childReplies = replies.filter(r => r.parentId === p.id);
                    if (childReplies.length > 0) {
                        html += `<div class="replies-container">`;
                        childReplies.forEach(r => html += generateCommentHTML(r, true, p));
                        html += `</div>`;
                    }
                });
                commentListBlock.innerHTML = html;
            } catch (error) {
                console.error("Lỗi tải bình luận:", error);
                commentListBlock.innerHTML = "<p style='color: #ff5555;'>Lỗi tải bình luận.</p>";
            }
        }

        const mainCommentForm = document.getElementById('main-comment-form');
        const btnSubmitComment = document.getElementById('btnSubmitComment');

        mainCommentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !currentUserData) return;
            btnSubmitComment.disabled = true;
            const content = document.getElementById('main-comment-text').value.trim();

            const cmtObject = {
                targetType: "story",
                targetId: storyId,
                userId: currentUser.uid,
                displayName: currentUserData.displayName,
                avatar: currentUserData.avatar || "",
                content: content,
                likedBy: [],
                parentId: null,
                replyToUid: null,
                replyToName: null,
                isEdited: false,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "comments"), cmtObject);
                document.getElementById('main-comment-text').value = "";
                loadComments();
            } catch (error) { console.error(error); alert("Lỗi khi đăng bình luận."); }
            finally { btnSubmitComment.disabled = false; }
        });

        commentListBlock.addEventListener('click', async (e) => {
            const target = e.target;
            const action = target.getAttribute('data-action');
            if (!action) return;

            if (action === "delete") {
                if (!confirm("Bạn có chắc chắn muốn xóa bình luận này?")) return;
                const cmtId = target.getAttribute('data-id');
                try {
                    await deleteDoc(doc(db, "comments", cmtId));
                    loadComments();
                } catch (err) { console.error(err); alert("Lỗi xóa bình luận."); }
            }

            if (action === "reply") {
                if (!currentUser) { alert("Vui lòng đăng nhập để phản hồi."); return; }
                const cmtId = target.getAttribute('data-id');
                const tagName = target.getAttribute('data-tag-name');
                const tagUid = target.getAttribute('data-tag-uid'); // Lấy UID người bị Tag

                document.querySelectorAll('.reply-input-box').forEach(box => { box.style.display = 'none'; });
                const replyBox = document.getElementById(`reply-box-${cmtId}`);
                const replyInput = document.getElementById(`reply-text-${cmtId}`);
                replyBox.style.display = 'flex';

                if (tagName) {
                    replyInput.value = `@${tagName} `;
                    // Gắn tạm data vào Input để chờ lúc ấn Gửi
                    replyInput.setAttribute('data-reply-name', tagName);
                    replyInput.setAttribute('data-reply-uid', tagUid);
                } else {
                    replyInput.value = "";
                    replyInput.removeAttribute('data-reply-name');
                    replyInput.removeAttribute('data-reply-uid');
                }
                replyInput.focus();
            }

            if (action === "submit-reply") {
                const parentId = target.getAttribute('data-parent-id');
                const boxId = target.getAttribute('data-box-id');
                const replyInput = document.getElementById(`reply-text-${boxId}`);
                const content = replyInput.value.trim();

                // Lấy UID và Name của người bị Tag ra khỏi thẻ Input
                const replyToName = replyInput.getAttribute('data-reply-name') || null;
                const replyToUid = replyInput.getAttribute('data-reply-uid') || null;

                if (content === "") return;
                target.textContent = "...";

                const replyObject = {
                    targetType: "story",
                    targetId: storyId,
                    userId: currentUser.uid,
                    displayName: currentUserData.displayName,
                    avatar: currentUserData.avatar || "",
                    content: content,
                    likedBy: [],
                    parentId: parentId,
                    replyToUid: replyToUid,
                    replyToName: replyToName,
                    isEdited: false,
                    createdAt: new Date().toISOString()
                };

                try {
                    await addDoc(collection(db, "comments"), replyObject);
                    loadComments();
                } catch (err) { console.error(err); alert("Lỗi gửi phản hồi."); target.textContent = "Gửi"; }
            }

            if (action === "edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'none';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'flex';
            }

            if (action === "cancel-edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'block';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'none';
            }

            if (action === "save-edit") {
                const cmtId = target.getAttribute('data-id');
                const newContent = document.getElementById(`edit-input-${cmtId}`).value.trim();

                if (newContent === "") { alert("Nội dung không được để trống!"); return; }

                target.textContent = "Đang lưu...";
                try {
                    const cmtRef = doc(db, "comments", cmtId);
                    await updateDoc(cmtRef, { content: newContent, isEdited: true });
                    loadComments();
                } catch (error) { console.error("Lỗi sửa:", error); alert("Lỗi khi lưu chỉnh sửa."); target.textContent = "Lưu thay đổi"; }
            }

            if (action === "like") {
                if (!currentUser) { alert("Vui lòng đăng nhập để Thích."); return; }
                const cmtId = target.getAttribute('data-id');
                const cmtRef = doc(db, "comments", cmtId);

                try {
                    const isLiked = target.classList.contains('liked');
                    if (isLiked) { await updateDoc(cmtRef, { likedBy: arrayRemove(currentUser.uid) }); }
                    else { await updateDoc(cmtRef, { likedBy: arrayUnion(currentUser.uid) }); }
                    loadComments();
                } catch (error) { console.error(error); }
            }
        });

        renderStoryInfo();
    </script>
</body>

</html>
