<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Truyện - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== INFO CARD ===== */
        .info-container {
            position: relative;
            overflow: hidden;
            max-width: 900px;
            margin: 82px auto 24px;
            background: var(--bg-card);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            gap: 32px;
            box-shadow: var(--shadow-md);
        }

        .info-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(34px) brightness(0.45) saturate(125%);
            transform: scale(1.18);
            z-index: 0;
        }

        .info-hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(29, 40, 57, 0.55) 0%, rgba(29, 40, 57, 0.88) 100%);
        }

        .cover-wrapper,
        .meta-wrapper { position: relative; z-index: 1; }

        .cover-wrapper {
            flex-shrink: 0;
            width: 220px;
        }

        .cover-wrapper img {
            width: 100%;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            display: block;
        }

        .meta-wrapper {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .story-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-1);
            margin-bottom: 14px;
            line-height: 1.25;
            letter-spacing: -0.3px;
        }

        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 20px;
            margin-bottom: 4px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 6px;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .meta-icon {
            color: var(--text-3);
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            display: block;
        }

        .meta-label {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        .meta-value { color: var(--text-1); font-weight: 600; font-size: 13px; }

        .meta-link { color: var(--blue); text-decoration: none; font-weight: 600; font-size: 13px; }
        .meta-link:hover { text-decoration: underline; }

        .tag-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }

        .tag-bubble {
            background: var(--bg-hover);
            color: var(--text-2);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            letter-spacing: 0.3px;
            transition: background 0.2s, color 0.2s;
        }

        .tag-bubble:hover { background: var(--accent-dim); color: var(--accent); }

        /* ===== ACTION BUTTONS ===== */
        .action-bars {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            padding: 11px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.2s var(--ease), transform 0.15s, box-shadow 0.2s;
        }

        .action-bars .btn { flex: 1; }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-read { background: var(--accent); color: #121a28; }
        .btn-read:hover { background: var(--accent-dark); box-shadow: 0 4px 16px var(--accent-glow); }

        .btn-save {
            background: var(--bg-hover);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .btn-edit {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(91, 163, 224, 0.4);
            font-size: 13px;
            padding: 8px 15px;
        }

        .btn-edit:hover { background: rgba(91, 163, 224, 0.2); }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: flex;
            align-items: center;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            gap: 16px;
        }

        .stats-left { display: flex; align-items: flex-start; gap: 24px; flex: 1; }

        .stat-item { display: flex; flex-direction: column; }

        .stat-num {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-1);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .stats-right { display: flex; gap: 8px; align-items: center; }

        /* ===== ICON BUTTONS ===== */
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-2);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
            text-decoration: none;
            flex-shrink: 0;
        }

        .icon-btn:hover { transform: translateY(-1px); }
        .icon-btn.like-btn.liked { border-color: var(--red); color: var(--red); background: rgba(255, 94, 108, 0.12); }
        .icon-btn.like-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255, 94, 108, 0.08); }
        .icon-btn.edit-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
        .icon-btn.delete-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255, 94, 108, 0.08); }

        .icon-btn .ic { width: 18px; height: 18px; }
        .ic { width: 16px; height: 16px; flex-shrink: 0; vertical-align: -3px; }

        /* ===== MOBILE ===== */
        @media (max-width: 640px) {
            .info-container {
                flex-direction: column;
                align-items: center;
                padding: 24px 20px;
                gap: 20px;
            }

            .cover-wrapper { width: 60%; max-width: 200px; }

            .meta-wrapper { width: 100%; }

            .story-title { font-size: 20px; text-align: center; }

            .meta-grid { justify-content: center; }
            .meta-item { justify-content: center; }
            .tag-list { justify-content: center; }

            .action-bars { flex-direction: column; }

            .stats-row {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }

            .stats-left { justify-content: space-around; }

            .stats-right { justify-content: center; gap: 12px; }

            .stats-right .icon-btn { flex: 1; height: 44px; width: auto; }
        }

        /* ===== SECTIONS ===== */
        .description-section,
        .chapter-section,
        .comment-section {
            max-width: 900px;
            margin: 0 auto 20px;
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .description-content {
            color: var(--text-1);
            line-height: 1.85;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            font-size: 15px;
        }

        .chapter-section { margin-bottom: 20px; }
        .comment-section { margin-bottom: 50px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            gap: 12px;
        }

        .sec-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.2px;
        }

        .sec-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .chapter-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 3px; }

        .chapter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: background 0.2s var(--ease);
        }

        .chapter-item:hover { background: var(--bg-hover); }

        .chapter-num {
            flex-shrink: 0;
            min-width: 30px;
            height: 30px;
            padding: 0 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-2);
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .chapter-item:hover .chapter-num {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .chapter-name {
            flex: 1;
            min-width: 0;
            color: var(--text-1);
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .chapter-item:hover .chapter-name { color: var(--accent); }

        .chapter-date { color: var(--text-3); font-size: 12.5px; white-space: nowrap; flex-shrink: 0; }

        /* ===== COMPOSER ===== */
        .comment-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }

        .comment-form textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            padding: 13px 15px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 84px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .comment-form textarea::placeholder { color: var(--text-3); }
        .comment-form textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

        .comment-form button {
            align-self: flex-end;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            background: var(--accent);
            color: #121a28;
            border: none;
            font-weight: 700;
            font-size: 14px;
            font-family: inherit;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .comment-form button svg { width: 16px; height: 16px; }
        .comment-form button:hover { background: var(--accent-dark); transform: translateY(-1px); }

        /* ===== COMMENTS ===== */
        .comment-item { display: flex; gap: 13px; margin-bottom: 22px; }
        .comment-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }

        .comment-body {
            flex: 1;
            min-width: 0;
            background: var(--bg-surface);
            padding: 13px 16px 11px;
            border-radius: 14px;
            border: 1px solid var(--border-muted);
        }

        .comment-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 5px; }
        .comment-author { font-weight: 700; font-size: 14px; }
        .comment-author a { color: var(--text-1); text-decoration: none; transition: color 0.2s; }
        .comment-author a:hover { color: var(--accent); }
        .comment-time { font-size: 11.5px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }

        .comment-text { color: var(--text-1); line-height: 1.65; white-space: pre-wrap; overflow-wrap: break-word; margin-bottom: 10px; font-size: 14.5px; }

        .comment-actions { display: flex; gap: 2px; align-items: center; flex-wrap: wrap; margin-left: -6px; }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 99px;
            color: var(--text-3);
            cursor: pointer;
            user-select: none;
            font-size: 12.5px;
            font-weight: 600;
            transition: color 0.15s, background 0.15s;
        }

        .action-btn svg, .action-btn span { pointer-events: none; }
        .action-btn svg { width: 15px; height: 15px; }
        .action-btn:hover { color: var(--text-1); background: var(--bg-hover); }
        .action-btn.delete:hover { color: var(--red); background: rgba(255, 94, 108, 0.1); }
        .action-btn.liked { color: var(--red); }
        .action-btn.liked svg { fill: currentColor; }

        .replies-container {
            margin-left: 54px;
            border-left: 2px solid var(--border);
            padding-left: 16px;
        }

        @media (max-width: 600px) { .replies-container { margin-left: 20px; padding-left: 12px; } }

        .reply-input-box { display: none; margin-top: 12px; gap: 8px; }

        .reply-input-box input {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--accent);
            color: var(--text-1);
            padding: 9px 14px;
            border-radius: 99px;
            outline: none;
            font-family: inherit;
            font-size: 13.5px;
        }

        .reply-input-box button {
            padding: 8px 18px;
            background: var(--accent);
            color: #121a28;
            border: none;
            font-weight: 700;
            font-size: 13px;
            border-radius: 99px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .reply-input-box button:hover { background: var(--accent-dark); }

        .comment-edit-box { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }

        .comment-edit-box textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--accent);
            color: var(--text-1);
            padding: 11px 13px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .edit-actions button {
            padding: 7px 16px;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save-edit { background: var(--accent); color: #121a28; }
        .btn-save-edit:hover { background: var(--accent-dark); }

        .btn-cancel-edit {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border) !important;
        }

        .btn-cancel-edit:hover { background: var(--bg-hover); }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="info-container" id="story-info-block">
        <h2 style="color: #9aa7bc; width: 100%; text-align: center;">Đang trích xuất dữ liệu...</h2>
    </div>

    <div class="description-section" id="story-desc-block" style="display: none;">
        <div class="section-header">
            <h3 class="sec-title">Tóm tắt nội dung</h3>
        </div>
        <div class="description-content" id="desc-text-content"></div>
    </div>

    <div class="chapter-section">
        <div class="section-header">
            <h3 class="sec-title">Danh sách chương</h3>
            <a href="#" class="btn btn-edit" id="btnAddChapter">+ Thêm chương</a>
        </div>
        <ul class="chapter-list" id="chapter-list-block">
            <li style="color: #9aa7bc; text-align: center;">Hệ thống đang tải danh sách chương...</li>
        </ul>
    </div>

    <div class="comment-section">
        <div class="section-header">
            <h3 class="sec-title">Bình luận</h3>
        </div>

        <div id="comment-auth-warning" style="text-align: center; color: #ff5e6c; padding: 20px 0;">
            Vui lòng <a href="login.html" style="color: #5ba3e0;">đăng nhập</a> để bình luận.
        </div>
        <form class="comment-form" id="main-comment-form" style="display: none;">
            <textarea id="main-comment-text" placeholder="Bạn nghĩ gì về bộ truyện này?" required></textarea>
            <button type="submit" id="btnSubmitComment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Gửi bình luận</button>
        </form>

        <div id="comment-list-block">
            <p style="color: #9aa7bc; text-align: center;">Đang tải bình luận...</p>
        </div>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, addDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');

        const ICON_PLAY = `<svg class="ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`;
        const ICON_BOOKMARK = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>`;
        const ICON_HEART = `<svg class="ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 20.3l-1.45-1.32C5.4 14.25 2 11.18 2 7.4 2 4.42 4.42 2 7.4 2c1.74 0 3.41.81 4.6 2.09C13.19 2.81 14.86 2 16.6 2 19.58 2 22 4.42 22 7.4c0 3.78-3.4 6.85-8.55 11.59L12 20.3z"/></svg>`;
        const ICON_EDIT = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
        const ICON_TRASH = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>`;

        let currentStoryData = null;
        let currentUser = null;
        let currentUserData = null;

        function updateBookmarkUI() {
            const btnBookmark = document.getElementById('btnBookmark');
            if (btnBookmark && currentUserData) {
                if (currentUserData.bookmarked && currentUserData.bookmarked.includes(storyId)) {
                    btnBookmark.innerHTML = `${ICON_BOOKMARK} Bỏ lưu`;
                    btnBookmark.style.background = 'var(--accent)';
                    btnBookmark.style.color = '#121a28';
                    btnBookmark.style.borderColor = 'var(--accent)';
                } else {
                    btnBookmark.innerHTML = `${ICON_BOOKMARK} Lưu truyện`;
                    btnBookmark.style.background = 'var(--bg-hover)';
                    btnBookmark.style.color = 'var(--text-2)';
                    btnBookmark.style.borderColor = 'var(--border)';
                }
            }
        }

        async function checkPermissions() {
            if (currentUser && currentStoryData && currentUserData) {
                if (currentUserData.role === "admin" || currentUser.uid === currentStoryData.uploaderId) {
                    const btnAddChapter = document.getElementById('btnAddChapter');
                    btnAddChapter.style.display = 'inline-block';
                    btnAddChapter.href = `add-chapter.html?storyId=${storyId}`;

                    const btnEdit = document.getElementById('btnEditStory');
                    const btnDelete = document.getElementById('btnDeleteStory');
                    if (btnEdit) btnEdit.style.display = 'inline-flex';
                    if (btnDelete) btnDelete.style.display = 'inline-flex';
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    document.getElementById('comment-auth-warning').style.display = 'none';
                    document.getElementById('main-comment-form').style.display = 'flex';
                    updateBookmarkUI();

                    const btnLike = document.getElementById('btnLikeStory');
                    if (btnLike && currentStoryData && currentStoryData.likedBy && currentStoryData.likedBy.includes(user.uid)) {
                        btnLike.classList.add('liked');
                        btnLike.title = 'Bỏ thích';
                    }
                }
            } else {
                currentUserData = null;
                document.getElementById('comment-auth-warning').style.display = 'block';
                document.getElementById('main-comment-form').style.display = 'none';
            }
            checkPermissions();
        });

        async function renderStoryInfo() {
            const infoBlock = document.getElementById('story-info-block');
            const descBlock = document.getElementById('story-desc-block');
            const descTextContent = document.getElementById('desc-text-content');

            if (!storyId) { infoBlock.innerHTML = "<h2 style='color:#ff5e6c; width:100%; text-align:center;'>Không tìm thấy mã truyện!</h2>"; return; }

            try {
                const storyRef = doc(db, "stories", storyId);
                const storySnap = await getDoc(storyRef);
                if (!storySnap.exists()) { infoBlock.innerHTML = "<h2 style='color:#ff5e6c; width:100%; text-align:center;'>Truyện đã bị xóa!</h2>"; return; }
                currentStoryData = storySnap.data();

                let firstChapterUrl = "#";
                const chaptersRef = collection(db, "chapters");
                const q = query(chaptersRef, where("storyId", "==", storyId));
                const querySnapshot = await getDocs(q);
                let chaptersArray = [];
                querySnapshot.forEach((doc) => { chaptersArray.push({ id: doc.id, ...doc.data() }); });

                if (chaptersArray.length > 0) {
                    chaptersArray.sort((a, b) => a.chapterNumber - b.chapterNumber);
                    firstChapterUrl = `read.html?chapterId=${chaptersArray[0].id}`;
                }

                let translatorName = "Ẩn danh";
                if (currentStoryData.uploaderId) {
                    const userSnap = await getDoc(doc(db, "users", currentStoryData.uploaderId));
                    if (userSnap.exists()) translatorName = userSnap.data().displayName;
                }

                let tagsHTML = '';
                if (currentStoryData.tags && Array.isArray(currentStoryData.tags)) {
                    currentStoryData.tags.forEach(tag => tagsHTML += `<span class="tag-bubble">${tag}</span>`);
                }

                let isLiked = false;
                if (currentUser && currentStoryData.likedBy && currentStoryData.likedBy.includes(currentUser.uid)) {
                    isLiked = true;
                }
                const likeCountDisplay = currentStoryData.likeCount || 0;

                infoBlock.innerHTML = `
                    <div class="info-hero-bg" style="background-image:url('${currentStoryData.coverImage}')"></div>
                    <div class="cover-wrapper">
                        <img src="${currentStoryData.coverImage}" alt="Cover">
                    </div>
                    <div class="meta-wrapper">
                        <h1 class="story-title">${currentStoryData.title}</h1>

                        <div class="meta-grid">
                            <div class="meta-item">
                                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207l6.5-6.5zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.499.499 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/></svg>
                                <span class="meta-label">Tác Giả:</span>
                                <span class="meta-value">${currentStoryData.originalAuthor || 'Đang cập nhật'}</span>
                            </div>
                            <div class="meta-item">
                                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/></svg>
                                <span class="meta-label">Trạng Thái:</span>
                                <span class="meta-value">${currentStoryData.status || 'Đang cập nhật'}</span>
                            </div>
                        </div>
                        <div class="meta-item">
                            <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z"/></svg>
                            <span class="meta-label">Dịch Giả:</span>
                            <a href="profile.html?uid=${currentStoryData.uploaderId}" class="meta-link">${translatorName}</a>
                        </div>

                        <div class="tag-list">${tagsHTML}</div>

                        <div class="action-bars">
                            <a href="${firstChapterUrl}" class="btn btn-read" ${chaptersArray.length === 0 ? 'style="opacity:0.5;pointer-events:none;"' : ''}>${ICON_PLAY} Đọc ngay</a>
                            <button class="btn btn-save" id="btnBookmark">${ICON_BOOKMARK} Lưu truyện</button>
                        </div>

                        <div class="stats-row">
                            <div class="stats-left">
                                <div class="stat-item">
                                    <span class="stat-num">${(currentStoryData.views || 0).toLocaleString('vi-VN')}</span>
                                    <span class="stat-lbl">Lượt Xem</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-num" id="like-count-display">${likeCountDisplay}</span>
                                    <span class="stat-lbl">Yêu Thích</span>
                                </div>
                            </div>
                            <div class="stats-right">
                                <button class="icon-btn like-btn${isLiked ? ' liked' : ''}" id="btnLikeStory" title="${isLiked ? 'Bỏ thích' : 'Thích truyện'}">${ICON_HEART}</button>
                                <a href="add-story.html?editId=${storyId}" class="icon-btn edit-btn" id="btnEditStory" title="Sửa thông tin" style="display:none;">${ICON_EDIT}</a>
                                <button class="icon-btn delete-btn" id="btnDeleteStory" data-story-id="${storyId}" title="Xóa truyện" style="display:none;">${ICON_TRASH}</button>
                            </div>
                        </div>
                    </div>
                `;

                const descText = currentStoryData.description || "Chưa có mô tả cho bộ truyện này.";
                descTextContent.textContent = descText;
                descBlock.style.display = 'block';

                document.title = currentStoryData.title + " - Mã Đề 0099";
                checkPermissions();
                updateBookmarkUI();

                const chapterListBlock = document.getElementById('chapter-list-block');
                if (chaptersArray.length === 0) {
                    chapterListBlock.innerHTML = `<li style="color: #9aa7bc; text-align: center;">Chưa có chương nào được đăng tải.</li>`;
                } else {
                    chapterListBlock.innerHTML = "";
                    chaptersArray.forEach(chap => {
                        const dateString = new Date(chap.createdAt).toLocaleDateString('vi-VN');
                        chapterListBlock.innerHTML += `
                            <li>
                                <a class="chapter-item" href="read.html?chapterId=${chap.id}">
                                    <span class="chapter-num">${chap.chapterNumber}</span>
                                    <span class="chapter-name">Chương ${chap.chapterNumber}${chap.title ? ': ' + chap.title : ''}</span>
                                    <span class="chapter-date">${dateString}</span>
                                </a>
                            </li>
                        `;
                    });
                }

                loadComments();
            } catch (error) {
                console.error(error);
                infoBlock.innerHTML = "<h2 style='color:#ff5e6c; width:100%; text-align:center;'>Lỗi kết nối CSDL!</h2>";
            }
        }

        const infoBlock = document.getElementById('story-info-block');
        infoBlock.addEventListener('click', async (e) => {
            if (e.target.id === 'btnBookmark') {
                e.preventDefault();
                if (!currentUser || !currentUserData) { showToast("Vui lòng đăng nhập để sử dụng tính năng Lưu truyện!", "warning"); return; }

                const userRef = doc(db, "users", currentUser.uid);
                const btn = e.target;
                btn.textContent = "Đang xử lý...";

                try {
                    if (!currentUserData.bookmarked) currentUserData.bookmarked = [];
                    const isBookmarked = currentUserData.bookmarked.includes(storyId);

                    if (isBookmarked) {
                        await updateDoc(userRef, { bookmarked: arrayRemove(storyId) });
                        currentUserData.bookmarked = currentUserData.bookmarked.filter(id => id !== storyId);
                    } else {
                        await updateDoc(userRef, { bookmarked: arrayUnion(storyId) });
                        currentUserData.bookmarked.push(storyId);
                    }
                    updateBookmarkUI();
                } catch (error) {
                    console.error("Lỗi khi lưu truyện:", error);
                    showToast("Đã xảy ra lỗi hệ thống, vui lòng thử lại sau.", "error");
                    updateBookmarkUI();
                }
            }

            if (e.target.id === 'btnLikeStory') {
                e.preventDefault();
                if (!currentUser) { showToast("Vui lòng đăng nhập để Thích truyện!", "warning"); return; }

                const btn = e.target;
                btn.disabled = true;

                try {
                    const storyRef = doc(db, "stories", storyId);
                    if (!currentStoryData.likedBy) currentStoryData.likedBy = [];
                    const isLiked = currentStoryData.likedBy.includes(currentUser.uid);

                    if (isLiked) {
                        await updateDoc(storyRef, {
                            likedBy: arrayRemove(currentUser.uid),
                            likeCount: increment(-1)
                        });
                        currentStoryData.likedBy = currentStoryData.likedBy.filter(id => id !== currentUser.uid);
                        currentStoryData.likeCount = Math.max(0, (currentStoryData.likeCount || 0) - 1);
                        btn.classList.remove('liked');
                        btn.title = 'Thích truyện';
                    } else {
                        await updateDoc(storyRef, {
                            likedBy: arrayUnion(currentUser.uid),
                            likeCount: increment(1)
                        });
                        currentStoryData.likedBy.push(currentUser.uid);
                        currentStoryData.likeCount = (currentStoryData.likeCount || 0) + 1;
                        btn.classList.add('liked');
                        btn.title = 'Bỏ thích';
                    }
                    const likeDisplay = document.getElementById('like-count-display');
                    if (likeDisplay) likeDisplay.textContent = currentStoryData.likeCount;
                } catch (error) {
                    console.error("Lỗi khi like truyện:", error);
                    showToast("Có lỗi xảy ra, vui lòng thử lại.", "error");
                } finally {
                    btn.disabled = false;
                }
            }
        });

        document.addEventListener('click', async (e) => {
            if (e.target.id === 'btnDeleteStory') {
                e.preventDefault();
                if (!await showConfirm("Tất cả chương và bình luận sẽ bị xóa vĩnh viễn và không thể khôi phục!", { title: "Xóa toàn bộ truyện?", icon: "⛔", confirmText: "Xóa tất cả", cancelText: "Hủy" })) return;

                const targetStoryId = e.target.getAttribute('data-story-id');
                e.target.style.opacity = '0.4';
                e.target.disabled = true;

                try {
                    const deletePromises = [];
                    const chaptersQuery = query(collection(db, "chapters"), where("storyId", "==", targetStoryId));
                    const chaptersSnap = await getDocs(chaptersQuery);

                    for (const chapDoc of chaptersSnap.docs) {
                        const chapId = chapDoc.id;
                        deletePromises.push(deleteDoc(doc(db, "chapters", chapId)));
                        const chapCmtQuery = query(collection(db, "comments"), where("targetId", "==", chapId));
                        const chapCmtSnap = await getDocs(chapCmtQuery);
                        chapCmtSnap.forEach(cmtSnap => {
                            deletePromises.push(deleteDoc(doc(db, "comments", cmtSnap.id)));
                        });
                    }

                    const storyCmtQuery = query(collection(db, "comments"), where("targetId", "==", targetStoryId));
                    const storyCmtSnap = await getDocs(storyCmtQuery);
                    storyCmtSnap.forEach(cmtSnap => {
                        deletePromises.push(deleteDoc(doc(db, "comments", cmtSnap.id)));
                    });

                    await Promise.all(deletePromises);
                    await deleteDoc(doc(db, "stories", targetStoryId));

                    showToast("Đã xóa bộ truyện và toàn bộ dữ liệu thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = "index.html";
                } catch (error) {
                    console.error("Lỗi xóa truyện:", error);
                    showToast("Có lỗi xảy ra khi xóa truyện. Vui lòng kiểm tra Console (F12).", "error");
                    e.target.style.opacity = '';
                    e.target.disabled = false;
                }
            }
        });

        const commentListBlock = document.getElementById('comment-list-block');

        function escapeHTML(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        const CIC = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"';
        const IC_HEART = `<svg ${CIC}><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`;
        const IC_REPLY = `<svg ${CIC}><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`;
        const IC_CEDIT = `<svg ${CIC}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
        const IC_CTRASH = `<svg ${CIC}><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>`;

        function generateCommentHTML(c, isReply = false, parentComment = null) {
            const dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
            const avatar = c.avatar || "https://www.w3schools.com/howto/img_avatar.png";

            let actionBtnsHTML = "";
            if (currentUser && currentUserData) {
                if (currentUser.uid === c.userId) actionBtnsHTML += `<div class="action-btn" data-action="edit" data-id="${c.id}">${IC_CEDIT} Sửa</div>`;
                if (currentUser.uid === c.userId || currentUserData.role === 'admin') actionBtnsHTML += `<div class="action-btn delete" data-action="delete" data-id="${c.id}">${IC_CTRASH} Xóa</div>`;
            }

            let isLiked = false;
            let likeCount = c.likedBy ? c.likedBy.length : 0;
            if (currentUser && c.likedBy && c.likedBy.includes(currentUser.uid)) isLiked = true;

            const editedTag = c.isEdited ? `<span style="font-size: 11px; font-style: italic; color: #5e6e86; margin-left: 5px;">(đã chỉnh sửa)</span>` : "";
            const replyParentId = isReply ? c.parentId : c.id;

            // XÁC ĐỊNH MỤC TIÊU BỊ TAG
            const tagTargetName = c.displayName;
            const tagTargetUid = c.userId;

            let formattedContent = escapeHTML(c.content);

            if (c.replyToName && c.replyToUid) {
                const tagString = `@${escapeHTML(c.replyToName)}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${c.replyToUid}" style="color: #5ba3e0; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            } else if (isReply && parentComment) {
                const tagString = `@${escapeHTML(parentComment.displayName)}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${parentComment.userId}" style="color: #5ba3e0; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            }

            return `
                <div class="comment-item" id="cmt-${c.id}">
                    <a href="profile.html?uid=${c.userId}">
                        <img src="${avatar}" alt="Avatar" class="comment-avatar" ${isReply ? 'style="width:35px; height:35px;"' : ''} loading="lazy">
                    </a>
                    <div class="comment-body" style="width: 100%;">
                        <div class="comment-header">
                            <div class="comment-author">
                                <a href="profile.html?uid=${c.userId}" style="color: #5ba3e0; text-decoration: none;">${escapeHTML(c.displayName)}</a> ${editedTag}
                            </div>
                            <div class="comment-time">${dateStr}</div>
                        </div>

                        <div class="comment-text" id="text-display-${c.id}">${formattedContent}</div>

                        <div class="comment-edit-box" id="edit-box-${c.id}">
                            <textarea id="edit-input-${c.id}">${escapeHTML(c.content)}</textarea>
                            <div class="edit-actions">
                                <button class="btn-cancel-edit" data-action="cancel-edit" data-id="${c.id}">Hủy</button>
                                <button class="btn-save-edit" data-action="save-edit" data-id="${c.id}">Lưu thay đổi</button>
                            </div>
                        </div>

                        <div class="comment-actions">
                            <div class="action-btn ${isLiked ? 'liked' : ''}" data-action="like" data-id="${c.id}">
                                ${IC_HEART} <span>${likeCount}</span>
                            </div>
                            <div class="action-btn" data-action="reply" data-id="${c.id}" data-parent-id="${replyParentId}" data-tag-name="${tagTargetName}" data-tag-uid="${tagTargetUid}">${IC_REPLY} Trả lời</div>
                            ${actionBtnsHTML}
                        </div>
                        
                        <div class="reply-input-box" id="reply-box-${c.id}">
                            <input type="text" id="reply-text-${c.id}" placeholder="Viết phản hồi...">
                            <button data-action="submit-reply" data-parent-id="${replyParentId}" data-box-id="${c.id}">Gửi</button>
                        </div>
                    </div>
                </div>
            `;
        }

        let allComments = [];
        let displayedParentCount = 20;

        async function loadComments() {
            if (!storyId) return;
            try {
                const q = query(collection(db, "comments"), where("targetId", "==", storyId));
                const snap = await getDocs(q);
                allComments = [];
                snap.forEach(doc => allComments.push({ id: doc.id, ...doc.data() }));
                allComments.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                renderComments();
            } catch (error) {
                console.error("Lỗi tải bình luận:", error);
                commentListBlock.innerHTML = "<p style='color: #ff5e6c;'>Lỗi tải bình luận.</p>";
            }
        }

        function renderComments() {
            const parents = allComments.filter(c => c.parentId === null);
            const replies = allComments.filter(c => c.parentId !== null);

            if (allComments.length === 0) {
                commentListBlock.innerHTML = "<p style='color: #9aa7bc; text-align: center;'>Chưa có bình luận nào. Hãy là người đầu tiên!</p>";
                return;
            }

            const visibleParents = parents.slice(0, displayedParentCount);
            const remaining = parents.length - visibleParents.length;

            let html = "";
            visibleParents.forEach(p => {
                html += generateCommentHTML(p, false, null);
                const childReplies = replies.filter(r => r.parentId === p.id);
                if (childReplies.length > 0) {
                    html += `<div class="replies-container">`;
                    childReplies.forEach(r => html += generateCommentHTML(r, true, p));
                    html += `</div>`;
                }
            });

            if (remaining > 0) {
                html += `<div style="text-align:center;margin-top:20px;">
                    <button id="btnLoadMoreComments" style="padding:10px 28px;background:var(--bg-card);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.2s,color 0.2s,border-color 0.2s;">
                        Xem thêm ${remaining} bình luận
                    </button>
                </div>`;
            }

            commentListBlock.innerHTML = html;

            document.getElementById('btnLoadMoreComments')?.addEventListener('click', () => {
                displayedParentCount += 20;
                renderComments();
            });
        }

        const mainCommentForm = document.getElementById('main-comment-form');
        const btnSubmitComment = document.getElementById('btnSubmitComment');

        mainCommentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !currentUserData) return;
            btnSubmitComment.disabled = true;
            const content = document.getElementById('main-comment-text').value.trim();

            const cmtObject = {
                targetType: "story",
                targetId: storyId,
                userId: currentUser.uid,
                displayName: currentUserData.displayName,
                avatar: currentUserData.avatar || "",
                content: content,
                likedBy: [],
                parentId: null,
                replyToUid: null,
                replyToName: null,
                isEdited: false,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "comments"), cmtObject);
                document.getElementById('main-comment-text').value = "";
                displayedParentCount = 99999;
                loadComments();
            } catch (error) { console.error(error); showToast("Lỗi khi đăng bình luận.", "error"); }
            finally { btnSubmitComment.disabled = false; }
        });

        commentListBlock.addEventListener('click', async (e) => {
            const target = e.target;
            const action = target.getAttribute('data-action');
            if (!action) return;

            if (action === "delete") {
                if (!await showConfirm("Bình luận sẽ bị xóa vĩnh viễn.", { title: "Xóa bình luận?", icon: "🗑️", confirmText: "Xóa", cancelText: "Hủy" })) return;
                const cmtId = target.getAttribute('data-id');
                try {
                    await deleteDoc(doc(db, "comments", cmtId));
                    loadComments();
                } catch (err) { console.error(err); showToast("Lỗi xóa bình luận.", "error"); }
            }

            if (action === "reply") {
                if (!currentUser) { showToast("Vui lòng đăng nhập để phản hồi.", "warning"); return; }
                const cmtId = target.getAttribute('data-id');
                const tagName = target.getAttribute('data-tag-name');
                const tagUid = target.getAttribute('data-tag-uid'); // Lấy UID người bị Tag

                document.querySelectorAll('.reply-input-box').forEach(box => { box.style.display = 'none'; });
                const replyBox = document.getElementById(`reply-box-${cmtId}`);
                const replyInput = document.getElementById(`reply-text-${cmtId}`);
                replyBox.style.display = 'flex';

                if (tagName) {
                    replyInput.value = `@${tagName} `;
                    // Gắn tạm data vào Input để chờ lúc ấn Gửi
                    replyInput.setAttribute('data-reply-name', tagName);
                    replyInput.setAttribute('data-reply-uid', tagUid);
                } else {
                    replyInput.value = "";
                    replyInput.removeAttribute('data-reply-name');
                    replyInput.removeAttribute('data-reply-uid');
                }
                replyInput.focus();
            }

            if (action === "submit-reply") {
                const parentId = target.getAttribute('data-parent-id');
                const boxId = target.getAttribute('data-box-id');
                const replyInput = document.getElementById(`reply-text-${boxId}`);
                const content = replyInput.value.trim();

                // Lấy UID và Name của người bị Tag ra khỏi thẻ Input
                const replyToName = replyInput.getAttribute('data-reply-name') || null;
                const replyToUid = replyInput.getAttribute('data-reply-uid') || null;

                if (content === "") return;
                target.textContent = "...";

                const replyObject = {
                    targetType: "story",
                    targetId: storyId,
                    userId: currentUser.uid,
                    displayName: currentUserData.displayName,
                    avatar: currentUserData.avatar || "",
                    content: content,
                    likedBy: [],
                    parentId: parentId,
                    replyToUid: replyToUid,
                    replyToName: replyToName,
                    isEdited: false,
                    createdAt: new Date().toISOString()
                };

                try {
                    await addDoc(collection(db, "comments"), replyObject);
                    loadComments();
                } catch (err) { console.error(err); showToast("Lỗi gửi phản hồi.", "error"); target.textContent = "Gửi"; }
            }

            if (action === "edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'none';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'flex';
            }

            if (action === "cancel-edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'block';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'none';
            }

            if (action === "save-edit") {
                const cmtId = target.getAttribute('data-id');
                const newContent = document.getElementById(`edit-input-${cmtId}`).value.trim();

                if (newContent === "") { showToast("Nội dung không được để trống!", "warning"); return; }

                target.textContent = "Đang lưu...";
                try {
                    const cmtRef = doc(db, "comments", cmtId);
                    await updateDoc(cmtRef, { content: newContent, isEdited: true });
                    loadComments();
                } catch (error) { console.error("Lỗi sửa:", error); showToast("Lỗi khi lưu chỉnh sửa.", "error"); target.textContent = "Lưu thay đổi"; }
            }

            if (action === "like") {
                if (!currentUser) { showToast("Vui lòng đăng nhập để Thích.", "warning"); return; }
                const cmtId = target.getAttribute('data-id');
                const cmtRef = doc(db, "comments", cmtId);

                try {
                    const isLiked = target.classList.contains('liked');
                    if (isLiked) { await updateDoc(cmtRef, { likedBy: arrayRemove(currentUser.uid) }); }
                    else { await updateDoc(cmtRef, { likedBy: arrayUnion(currentUser.uid) }); }
                    loadComments();
                } catch (error) { console.error(error); }
            }
        });

        renderStoryInfo();
    </script>
</body>

</html>
