<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đọc Truyện - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== READER ===== */
        .reader-container {
            max-width: 780px;
            margin: 72px auto 32px;
            background: var(--bg-card);
            padding: 44px 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 600px) {
            .reader-container { padding: 28px 20px; }
        }

        .breadcrumb {
            margin-bottom: 28px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .breadcrumb a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: var(--text-3); }

        .chapter-header {
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 36px;
        }

        .chapter-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .story-name {
            font-size: 15px;
            color: var(--text-2);
            font-style: italic;
        }

        .chapter-content {
            font-size: 18px;
            line-height: 2;
            color: var(--text-1);
            white-space: pre-wrap;
            font-family: inherit;
            letter-spacing: 0.01em;
        }

        .navigation-bars {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 52px;
            border-top: 1px solid var(--border);
            padding-top: 22px;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: var(--bg-hover);
            color: var(--text-1);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            border: 1px solid var(--border);
            transition: background 0.2s var(--ease), border-color 0.2s, transform 0.15s;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: #0e0e16;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .nav-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* ===== LOCK ===== */
        .lock-container {
            text-align: center;
            padding: 56px 20px;
            background: var(--bg-surface);
            border: 1px dashed var(--accent);
            border-radius: var(--radius);
            margin: 20px 0;
        }

        .lock-icon { font-size: 48px; margin-bottom: 14px; }
        .lock-msg { color: var(--text-1); font-size: 16px; margin-bottom: 20px; }

        .lock-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 380px;
            margin: 0 auto;
        }

        .lock-input {
            padding: 11px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            border-radius: var(--radius-sm);
            flex: 1;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .lock-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

        .lock-btn {
            padding: 11px 22px;
            background: var(--accent);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            font-family: inherit;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .lock-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
        .lock-error { color: var(--red); margin-top: 14px; display: none; font-weight: 600; font-size: 14px; }

        /* ===== COMMENT SECTION ===== */
        .comment-section {
            max-width: 780px;
            margin: 0 auto 50px;
            background: var(--bg-card);
            padding: 32px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .comment-section { padding: 24px 16px; }
        }

        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

        .comment-form textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            padding: 12px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .comment-form textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }

        .comment-form button {
            align-self: flex-end;
            padding: 9px 22px;
            background: var(--blue);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            font-size: 14px;
            font-family: inherit;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .comment-form button:hover { background: #3388dd; transform: translateY(-1px); }

        .comment-item { display: flex; gap: 14px; margin-bottom: 20px; }
        .comment-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

        .comment-body {
            flex: 1;
            background: var(--bg-hover);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-muted);
        }

        .comment-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .comment-author { font-weight: 700; color: var(--accent); }
        .comment-time { font-size: 12px; color: var(--text-3); }

        .comment-text { color: var(--text-1); line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; font-size: 14px; }

        .comment-actions { display: flex; gap: 14px; font-size: 13px; }

        .action-btn { color: var(--text-3); cursor: pointer; transition: color 0.2s; user-select: none; font-weight: 500; }
        .action-btn:hover { color: var(--blue); }
        .action-btn.delete:hover { color: var(--red); }
        .action-btn.liked { color: var(--accent); font-weight: 700; }

        .replies-container { margin-left: 56px; border-left: 2px solid var(--border); padding-left: 16px; }

        .reply-input-box { display: none; margin-top: 10px; gap: 10px; }

        .reply-input-box input {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--blue);
            color: var(--text-1);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        .reply-input-box button {
            padding: 8px 16px;
            background: var(--accent);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .reply-input-box button:hover { background: var(--accent-dark); }

        .comment-edit-box { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }

        .comment-edit-box textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--accent);
            color: var(--text-1);
            padding: 10px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            outline: none;
        }

        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .edit-actions button {
            padding: 7px 14px;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save-edit { background: var(--accent); color: #0e0e16; }
        .btn-save-edit:hover { background: var(--accent-dark); }

        .btn-cancel-edit {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border) !important;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="reader-container" id="reader-block">
        <h2 style="color: #aaa; text-align: center;">Đang tải nội dung chương...</h2>
    </div>

    <div class="comment-section" id="comment-section-block" style="display: none;">
        <div style="border-bottom: 1px solid #2a2a35; padding-bottom: 10px; margin-bottom: 20px;">
            <h3 style="color: #ffaa00; margin: 0;">THẢO LUẬN CHƯƠNG NÀY</h3>
        </div>

        <div id="comment-auth-warning" style="text-align: center; color: #ff5555; padding: 20px 0;">
            Vui lòng <a href="login.html" style="color: #ffaa00;">đăng nhập</a> để bình luận.
        </div>
        <form class="comment-form" id="main-comment-form" style="display: none;">
            <textarea id="main-comment-text" placeholder="Bạn nghĩ gì về chương truyện này?" required></textarea>
            <button type="submit" id="btnSubmitComment">Gửi Bình Luận</button>
        </form>

        <div id="comment-list-block">
            <p style="color: #aaa; text-align: center;">Đang tải bình luận...</p>
        </div>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, addDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const chapterId = urlParams.get('chapterId');

        let currentUser = null;
        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    document.getElementById('comment-auth-warning').style.display = 'none';
                    document.getElementById('main-comment-form').style.display = 'flex';
                }
            } else {
                currentUserData = null;
                document.getElementById('comment-auth-warning').style.display = 'block';
                document.getElementById('main-comment-form').style.display = 'none';
            }
        });

        async function renderChapter() {
            const readerBlock = document.getElementById('reader-block');
            if (!chapterId) { readerBlock.innerHTML = "<h2 style='text-align:center; color:#ff5555;'>Không tìm thấy mã chương!</h2>"; return; }

            try {
                const chapterRef = doc(db, "chapters", chapterId);
                const chapterSnap = await getDoc(chapterRef);

                if (!chapterSnap.exists()) { readerBlock.innerHTML = "<h2 style='text-align:center; color:#ff5555;'>Chương này không tồn tại hoặc đã bị xóa.</h2>"; return; }

                const chapterData = chapterSnap.data();
                let storyTitle = "Tên truyện...";
                let storyUploaderId = null;

                const storyRef = doc(db, "stories", chapterData.storyId);
                const storySnap = await getDoc(storyRef);
                if (storySnap.exists()) {
                    storyTitle = storySnap.data().title;
                    storyUploaderId = storySnap.data().uploaderId;
                }

                function triggerViewIncrement() {
                    const viewSessionKey = `viewed_chap_${chapterId}`;
                    if (!sessionStorage.getItem(viewSessionKey)) {
                        updateDoc(storyRef, { views: increment(1) }).catch(err => console.error("Lỗi tăng view:", err));
                        sessionStorage.setItem(viewSessionKey, "true");
                    }
                }

                let isLocked = chapterData.password && chapterData.password.trim() !== "";
                let hasAccess = false;

                if (currentUser && currentUserData) {
                    if (currentUserData.role === "admin" || currentUser.uid === storyUploaderId) {
                        hasAccess = true;
                    }
                }
                if (sessionStorage.getItem(`unlocked_chap_${chapterId}`)) {
                    hasAccess = true;
                }

                let contentHTML = "";
                if (!isLocked || hasAccess) {
                    contentHTML = `<div class="chapter-content">${chapterData.content}</div>`;
                    triggerViewIncrement();
                } else {
                    contentHTML = `
                        <div class="lock-container" id="lock-block">
                            <div class="lock-icon">🔒</div>
                            <div class="lock-msg">Chương này đã được bảo vệ bằng mật mã.</div>
                            <div class="lock-input-group">
                                <input type="password" id="chap-password-input" class="lock-input" placeholder="Nhập mật mã...">
                                <button id="btnUnlock" class="lock-btn">Mở Khóa</button>
                            </div>
                            <div id="lock-error-msg" class="lock-error">Mật mã không chính xác!</div>
                        </div>
                        <div id="content-placeholder"></div>
                    `;
                }

                const chaptersRef = collection(db, "chapters");
                const chapQ = query(chaptersRef, where("storyId", "==", chapterData.storyId));
                const querySnapshot = await getDocs(chapQ);

                let chaptersArray = [];
                querySnapshot.forEach((doc) => { chaptersArray.push({ id: doc.id, chapterNumber: doc.data().chapterNumber }); });
                chaptersArray.sort((a, b) => a.chapterNumber - b.chapterNumber);
                const currentIndex = chaptersArray.findIndex(c => c.id === chapterId);

                let prevLink = `<a href="#" class="nav-btn disabled">Chương Trước</a>`;
                let nextLink = `<a href="#" class="nav-btn disabled">Chương Sau</a>`;

                if (currentIndex > 0) prevLink = `<a href="read.html?chapterId=${chaptersArray[currentIndex - 1].id}" class="nav-btn">Chương Trước</a>`;
                if (currentIndex < chaptersArray.length - 1) nextLink = `<a href="read.html?chapterId=${chaptersArray[currentIndex + 1].id}" class="nav-btn">Chương Sau</a>`;

                const chapterDisplayTitle = `Chương ${chapterData.chapterNumber}${chapterData.title ? ': ' + chapterData.title : ''}`;

                let adminControlsHTML = "";
                if (currentUser && currentUserData) {
                    if (currentUserData.role === "admin" || currentUser.uid === storyUploaderId) {
                        adminControlsHTML = `
                            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #2a2a35;">
                                <a href="add-chapter.html?editId=${chapterId}" class="btn" style="background: #4da6ff; color: #121218; padding: 10px 20px; font-weight: bold; border-radius: 4px; text-decoration: none;">Sửa Nội Dung</a>
                                <button class="btn" id="btnDeleteChapter" data-chap-id="${chapterId}" data-story-id="${chapterData.storyId}" style="background: #ff5555; color: #121218; padding: 10px 20px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer;">Xóa Chương</button>
                            </div>
                        `;
                    }
                }

                readerBlock.innerHTML = `
                    <div class="breadcrumb">
                        <a href="index.html">Trang Chủ</a> <span>/</span> 
                        <a href="info.html?id=${chapterData.storyId}">${storyTitle}</a> <span>/</span> 
                        <span style="color: #e0e0e0;">${chapterDisplayTitle}</span>
                    </div>
                    <div class="chapter-header">
                        <h1 class="chapter-title">${chapterDisplayTitle}</h1>
                        <div class="story-name">${storyTitle}</div>
                        ${adminControlsHTML}
                    </div>
                    ${contentHTML}
                    <div class="navigation-bars">
                        ${prevLink}
                        <a href="info.html?id=${chapterData.storyId}" class="nav-btn" style="background: #4da6ff; color:#121218;">Mục Lục</a>
                        ${nextLink}
                    </div>
                `;
                document.title = `${chapterDisplayTitle} - Mã Đề 0099`;

                if (isLocked && !hasAccess) {
                    document.getElementById('btnUnlock').addEventListener('click', () => {
                        const inputVal = document.getElementById('chap-password-input').value.trim();
                        if (inputVal === chapterData.password) {
                            sessionStorage.setItem(`unlocked_chap_${chapterId}`, "true");
                            triggerViewIncrement();
                            document.getElementById('lock-block').style.display = 'none';
                            document.getElementById('content-placeholder').innerHTML = `<div class="chapter-content">${chapterData.content}</div>`;
                        } else {
                            document.getElementById('lock-error-msg').style.display = 'block';
                        }
                    });

                    document.getElementById('chap-password-input').addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            document.getElementById('btnUnlock').click();
                        }
                    });
                }

                document.getElementById('comment-section-block').style.display = 'block';
                loadComments();

            } catch (error) { console.error(error); readerBlock.innerHTML = "<h2 style='text-align:center; color:#ff5555;'>Lỗi tải dữ liệu.</h2>"; }
        }

        const commentListBlock = document.getElementById('comment-list-block');

        function escapeHTML(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function generateCommentHTML(c, isReply = false, parentComment = null) {
            const dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
            const avatar = c.avatar || "https://www.w3schools.com/howto/img_avatar.png";

            let actionBtnsHTML = "";
            if (currentUser && currentUserData) {
                if (currentUser.uid === c.userId) actionBtnsHTML += `<div class="action-btn" data-action="edit" data-id="${c.id}">Sửa</div>`;
                if (currentUser.uid === c.userId || currentUserData.role === 'admin') actionBtnsHTML += `<div class="action-btn delete" data-action="delete" data-id="${c.id}">Xóa</div>`;
            }

            let isLiked = false;
            let likeCount = c.likedBy ? c.likedBy.length : 0;
            if (currentUser && c.likedBy && c.likedBy.includes(currentUser.uid)) isLiked = true;

            const editedTag = c.isEdited ? `<span style="font-size: 11px; font-style: italic; color: #888; margin-left: 5px;">(đã chỉnh sửa)</span>` : "";
            const replyParentId = isReply ? c.parentId : c.id;

            // XÁC ĐỊNH MỤC TIÊU BỊ TAG
            const tagTargetName = c.displayName;
            const tagTargetUid = c.userId;

            let formattedContent = escapeHTML(c.content);

            if (c.replyToName && c.replyToUid) {
                const tagString = `@${escapeHTML(c.replyToName)}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${c.replyToUid}" style="color: #4da6ff; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            } else if (isReply && parentComment) {
                const tagString = `@${escapeHTML(parentComment.displayName)}`;
                if (formattedContent.startsWith(tagString)) {
                    const hyperlinkTag = `<a href="profile.html?uid=${parentComment.userId}" style="color: #4da6ff; text-decoration: none; font-weight: bold;">${tagString}</a>`;
                    formattedContent = formattedContent.replace(tagString, hyperlinkTag);
                }
            }

            return `
                <div class="comment-item" id="cmt-${c.id}">
                    <a href="profile.html?uid=${c.userId}">
                        <img src="${avatar}" alt="Avatar" class="comment-avatar" ${isReply ? 'style="width:35px; height:35px;"' : ''} loading="lazy">
                    </a>
                    <div class="comment-body" style="width: 100%;">
                        <div class="comment-header">
                            <div class="comment-author">
                                <a href="profile.html?uid=${c.userId}" style="color: #ffaa00; text-decoration: none;">${escapeHTML(c.displayName)}</a> ${editedTag}
                            </div>
                            <div class="comment-time">${dateStr}</div>
                        </div>

                        <div class="comment-text" id="text-display-${c.id}">${formattedContent}</div>

                        <div class="comment-edit-box" id="edit-box-${c.id}">
                            <textarea id="edit-input-${c.id}">${escapeHTML(c.content)}</textarea>
                            <div class="edit-actions">
                                <button class="btn-cancel-edit" data-action="cancel-edit" data-id="${c.id}">Hủy</button>
                                <button class="btn-save-edit" data-action="save-edit" data-id="${c.id}">Lưu thay đổi</button>
                            </div>
                        </div>

                        <div class="comment-actions">
                            <div class="action-btn ${isLiked ? 'liked' : ''}" data-action="like" data-id="${c.id}">
                                ${isLiked ? 'Đã Thích' : 'Thích'} (${likeCount})
                            </div>
                            <div class="action-btn" data-action="reply" data-id="${c.id}" data-parent-id="${replyParentId}" data-tag-name="${tagTargetName}" data-tag-uid="${tagTargetUid}">Phản hồi</div>
                            ${actionBtnsHTML}
                        </div>
                        
                        <div class="reply-input-box" id="reply-box-${c.id}">
                            <input type="text" id="reply-text-${c.id}" placeholder="Viết phản hồi...">
                            <button data-action="submit-reply" data-parent-id="${replyParentId}" data-box-id="${c.id}">Gửi</button>
                        </div>
                    </div>
                </div>
            `;
        }

        let allComments = [];
        let displayedParentCount = 20;

        async function loadComments() {
            if (!chapterId) return;
            try {
                const q = query(collection(db, "comments"), where("targetId", "==", chapterId));
                const snap = await getDocs(q);
                allComments = [];
                snap.forEach(doc => allComments.push({ id: doc.id, ...doc.data() }));
                allComments.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                renderComments();
            } catch (error) { console.error(error); commentListBlock.innerHTML = "<p style='color: #ff5555;'>Lỗi tải bình luận.</p>"; }
        }

        function renderComments() {
            const parents = allComments.filter(c => c.parentId === null);
            const replies = allComments.filter(c => c.parentId !== null);

            if (allComments.length === 0) {
                commentListBlock.innerHTML = "<p style='color: #aaa; text-align: center;'>Chưa có bình luận nào cho chương này. Mở bát thôi!</p>";
                return;
            }

            const visibleParents = parents.slice(0, displayedParentCount);
            const remaining = parents.length - visibleParents.length;

            let html = "";
            visibleParents.forEach(p => {
                html += generateCommentHTML(p, false, null);
                const childReplies = replies.filter(r => r.parentId === p.id);
                if (childReplies.length > 0) {
                    html += `<div class="replies-container">`;
                    childReplies.forEach(r => html += generateCommentHTML(r, true, p));
                    html += `</div>`;
                }
            });

            if (remaining > 0) {
                html += `<div style="text-align:center;margin-top:20px;">
                    <button id="btnLoadMoreComments" style="padding:10px 28px;background:var(--bg-card);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.2s,color 0.2s,border-color 0.2s;">
                        Xem thêm ${remaining} bình luận
                    </button>
                </div>`;
            }

            commentListBlock.innerHTML = html;

            document.getElementById('btnLoadMoreComments')?.addEventListener('click', () => {
                displayedParentCount += 20;
                renderComments();
            });
        }

        const mainCommentForm = document.getElementById('main-comment-form');
        const btnSubmitComment = document.getElementById('btnSubmitComment');

        mainCommentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !currentUserData) return;
            btnSubmitComment.disabled = true;
            const content = document.getElementById('main-comment-text').value.trim();

            const cmtObject = {
                targetType: "chapter",
                targetId: chapterId,
                userId: currentUser.uid,
                displayName: currentUserData.displayName,
                avatar: currentUserData.avatar || "",
                content: content,
                likedBy: [],
                parentId: null,
                replyToUid: null,
                replyToName: null,
                isEdited: false,
                createdAt: new Date().toISOString()
            };

            try { await addDoc(collection(db, "comments"), cmtObject); document.getElementById('main-comment-text').value = ""; displayedParentCount = 99999; loadComments(); }
            catch (error) { console.error(error); showToast("Lỗi khi đăng bình luận.", "error"); }
            finally { btnSubmitComment.disabled = false; }
        });

        commentListBlock.addEventListener('click', async (e) => {
            const target = e.target;
            const action = target.getAttribute('data-action');
            if (!action) return;

            if (action === "delete") {
                if (!await showConfirm("Bình luận sẽ bị xóa vĩnh viễn.", { title: "Xóa bình luận?", icon: "🗑️", confirmText: "Xóa", cancelText: "Hủy" })) return;
                const cmtId = target.getAttribute('data-id');
                try { await deleteDoc(doc(db, "comments", cmtId)); loadComments(); }
                catch (err) { console.error(err); showToast("Lỗi xóa bình luận.", "error"); }
            }

            if (action === "reply") {
                if (!currentUser) { showToast("Vui lòng đăng nhập để phản hồi.", "warning"); return; }
                const cmtId = target.getAttribute('data-id');
                const tagName = target.getAttribute('data-tag-name');
                const tagUid = target.getAttribute('data-tag-uid'); // Lấy UID người bị Tag

                document.querySelectorAll('.reply-input-box').forEach(box => { box.style.display = 'none'; });
                const replyBox = document.getElementById(`reply-box-${cmtId}`);
                const replyInput = document.getElementById(`reply-text-${cmtId}`);
                replyBox.style.display = 'flex';

                if (tagName) {
                    replyInput.value = `@${tagName} `;
                    replyInput.setAttribute('data-reply-name', tagName);
                    replyInput.setAttribute('data-reply-uid', tagUid);
                } else {
                    replyInput.value = "";
                    replyInput.removeAttribute('data-reply-name');
                    replyInput.removeAttribute('data-reply-uid');
                }
                replyInput.focus();
            }

            if (action === "submit-reply") {
                const parentId = target.getAttribute('data-parent-id');
                const boxId = target.getAttribute('data-box-id');
                const replyInput = document.getElementById(`reply-text-${boxId}`);
                const content = replyInput.value.trim();

                const replyToName = replyInput.getAttribute('data-reply-name') || null;
                const replyToUid = replyInput.getAttribute('data-reply-uid') || null;

                if (content === "") return;
                target.textContent = "...";

                const replyObject = {
                    targetType: "chapter",
                    targetId: chapterId,
                    userId: currentUser.uid,
                    displayName: currentUserData.displayName,
                    avatar: currentUserData.avatar || "",
                    content: content,
                    likedBy: [],
                    parentId: parentId,
                    replyToUid: replyToUid,
                    replyToName: replyToName,
                    isEdited: false,
                    createdAt: new Date().toISOString()
                };

                try { await addDoc(collection(db, "comments"), replyObject); loadComments(); }
                catch (err) { console.error(err); showToast("Lỗi gửi phản hồi.", "error"); target.textContent = "Gửi"; }
            }

            if (action === "edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'none';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'flex';
            }

            if (action === "cancel-edit") {
                const cmtId = target.getAttribute('data-id');
                document.getElementById(`text-display-${cmtId}`).style.display = 'block';
                document.getElementById(`edit-box-${cmtId}`).style.display = 'none';
            }

            if (action === "save-edit") {
                const cmtId = target.getAttribute('data-id');
                const newContent = document.getElementById(`edit-input-${cmtId}`).value.trim();
                if (newContent === "") { showToast("Nội dung không được để trống!", "warning"); return; }

                target.textContent = "Đang lưu...";
                try {
                    await updateDoc(doc(db, "comments", cmtId), { content: newContent, isEdited: true });
                    loadComments();
                } catch (error) { console.error("Lỗi sửa:", error); showToast("Lỗi khi lưu chỉnh sửa.", "error"); target.textContent = "Lưu thay đổi"; }
            }

            if (action === "like") {
                if (!currentUser) { showToast("Vui lòng đăng nhập để Thích.", "warning"); return; }
                const cmtId = target.getAttribute('data-id');
                const cmtRef = doc(db, "comments", cmtId);
                try {
                    const isLiked = target.classList.contains('liked');
                    if (isLiked) { await updateDoc(cmtRef, { likedBy: arrayRemove(currentUser.uid) }); }
                    else { await updateDoc(cmtRef, { likedBy: arrayUnion(currentUser.uid) }); }
                    loadComments();
                } catch (error) { console.error(error); }
            }
        });

        document.addEventListener('click', async (e) => {
            if (e.target.id === 'btnDeleteChapter') {
                e.preventDefault();
                if (!await showConfirm("Toàn bộ bình luận của chương cũng sẽ bị xóa vĩnh viễn!", { title: "Xóa chương này?", icon: "⚠️", confirmText: "Xóa chương", cancelText: "Hủy" })) return;

                const chapId = e.target.getAttribute('data-chap-id');
                const parentStoryId = e.target.getAttribute('data-story-id');
                e.target.textContent = "Đang dọn dẹp dữ liệu...";
                e.target.disabled = true;

                try {
                    const cmtQuery = query(collection(db, "comments"), where("targetId", "==", chapId));
                    const cmtSnap = await getDocs(cmtQuery);

                    const deletePromises = [];
                    cmtSnap.forEach(docSnap => {
                        deletePromises.push(deleteDoc(doc(db, "comments", docSnap.id)));
                    });

                    await Promise.all(deletePromises);
                    await deleteDoc(doc(db, "chapters", chapId));

                    showToast("Đã xóa chương và dọn dẹp bình luận thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = `info.html?id=${parentStoryId}`;
                } catch (error) {
                    console.error("Lỗi xóa chương:", error);
                    showToast("Có lỗi xảy ra khi xóa.", "error");
                    e.target.textContent = "Xóa Chương";
                    e.target.disabled = false;
                }
            }
        });

        renderChapter();
    </script>
</body>

</html>
