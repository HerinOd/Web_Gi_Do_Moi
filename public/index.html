<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tên web - Nền Tảng Đọc Truyện Trực Tuyến</title>
  <link rel="stylesheet" href="style.css">
  <style>

    /* ===== FILTER BAR ===== */
    .filter-bar {
      max-width: 780px;
      margin: 28px auto;
      display: flex;
      gap: 10px;
      padding: 0 20px;
    }

    .filter-bar input,
    .filter-bar select {
      padding: 11px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-1);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .filter-bar input:focus,
    .filter-bar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .filter-bar input::placeholder {
      color: var(--text-3);
    }

    .filter-bar input {
      flex: 1;
      min-width: 0;
    }

    .filter-bar select {
      flex: 0 0 160px;
      max-width: 160px;
      cursor: pointer;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      max-width: 1200px;
      margin: 0 auto 22px;
      padding: 0 20px 14px;
      color: var(--text-1);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ===== GRID 5 CỘT ===== */
    .post-grid-layout {
      max-width: 1200px;
      margin: 0 auto 30px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      .post-grid-layout {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .post-grid-layout {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .filter-bar {
        flex-direction: column;
        padding: 0 16px;
      }

      .filter-bar select {
        flex: 0 0 auto;
        max-width: 100%;
      }

      .hero-title {
        font-size: 28px;
      }
    }

    /* ===== CARD ===== */
    .grid-item {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
      display: flex;
      flex-direction: column;
    }

    .grid-item:hover {
      transform: translateY(-7px);
      border-color: var(--accent);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--accent-glow);
    }

    .post-link {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
      color: inherit;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 11px;
      font-size: 11px;
      border-bottom: 1px solid var(--border-muted);
    }

    .card-uploader {
      display: flex;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    .card-uploader img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
    }

    .card-uploader-name {
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }

    .card-date {
      color: var(--text-3);
      white-space: nowrap;
    }

    .post-thumbnail {
      position: relative;
      width: 100%;
      padding-top: 133%;
      overflow: hidden;
      background: var(--bg-hover);
    }

    .post-thumbnail img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--ease);
    }

    .grid-item:hover .post-thumbnail img {
      transform: scale(1.06);
    }

    .status-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 9px;
      border-radius: var(--radius-xs);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      z-index: 2;
      backdrop-filter: blur(4px);
    }

    .status-ongoing {
      background: rgba(34, 197, 94, 0.85);
    }

    .status-completed {
      background: rgba(77, 159, 255, 0.85);
    }

    .status-paused {
      background: rgba(255, 77, 109, 0.85);
    }

    .tags-overlay {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      z-index: 2;
    }

    .tag-badge {
      background: rgba(240, 165, 0, 0.88);
      color: #0e0e16;
      padding: 2px 7px;
      border-radius: var(--radius-xs);
      font-size: 10px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .tag-badge.plus-tag {
      background: rgba(224, 36, 94, 0.85);
      color: #fff;
    }

    .thumbnail-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(0deg, rgba(14, 14, 22, 0.92) 0%, transparent 100%);
      z-index: 1;
    }

    .post-title {
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      padding: 9px 12px;
      color: var(--text-2);
      border-top: 1px solid var(--border-muted);
      font-size: 12px;
      background: var(--bg-surface);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }

    /* ===== CAROUSEL ===== */
    .carousel-section {
      margin: 0 0 28px;
      padding: 0;
    }

    .carousel-track-area {
      position: relative;
    }

    .carousel-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      height: 420px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      transition: opacity 0.55s var(--ease);
      pointer-events: none;
    }

    .carousel-slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .carousel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(24px) brightness(0.22);
      transform: scale(1.12);
    }

    .carousel-content {
      position: relative;
      z-index: 1;
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 80px;
      gap: 40px;
      align-items: center;
    }

    .carousel-cover {
      width: 172px;
      height: 250px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .carousel-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .carousel-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.85;
    }

    .carousel-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      letter-spacing: -0.5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .carousel-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .carousel-stats {
      display: flex;
      gap: 22px;
      color: rgba(238, 238, 245, 0.65);
      font-size: 14px;
      font-weight: 600;
    }

    .carousel-read-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 30px;
      background: var(--accent);
      color: #0e0e16;
      font-weight: 700;
      font-size: 14px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      width: fit-content;
      margin-top: 4px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .carousel-read-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 165, 0, 0.38);
    }

    .carousel-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(14, 14, 22, 0.6);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .carousel-nav-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e16;
      transform: translateY(-50%) scale(1.1);
    }

    .carousel-prev {
      left: 20px;
    }

    .carousel-next {
      right: 20px;
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 13px;
    }

    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 4px;
      background: var(--border);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.25s, width 0.3s var(--ease);
    }

    .carousel-dot.active {
      background: var(--accent);
      width: 24px;
    }

    @media (max-width: 900px) {
      .carousel-content { padding: 32px 48px; gap: 32px; }
    }

    @media (max-width: 700px) {
      .carousel-nav-btn { display: none !important; }
      .carousel-wrapper { height: 300px; }
      .carousel-content { padding: 24px 24px; gap: 20px; }
      .carousel-cover { width: 116px; height: 169px; }
      .carousel-title { font-size: 19px; }
      .carousel-read-btn { padding: 10px 20px; font-size: 13px; }
    }

    @media (max-width: 480px) {
      .carousel-wrapper { height: 260px; }
      .carousel-content { padding: 18px 16px; gap: 14px; }
      .carousel-cover { width: 88px; height: 128px; }
      .carousel-title { font-size: 15px; -webkit-line-clamp: 3; }
      .carousel-stats { font-size: 12px; gap: 12px; }
      .carousel-read-btn { padding: 8px 16px; font-size: 12px; margin-top: 0; }
      .carousel-info { gap: 9px; }
      .carousel-label { font-size: 10px; letter-spacing: 2px; }
    }

    /* ===== EMPTY ===== */
    .empty-msg {
      text-align: center;
      color: var(--text-2);
      width: 100%;
      grid-column: 1 / -1;
      padding: 60px 0;
      font-size: 16px;
    }

    /* ===== PAGINATION ===== */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 10px auto 50px;
      flex-wrap: wrap;
      max-width: 1200px;
      padding: 0 20px;
    }

    .page-btn {
      padding: 8px 15px;
      background: var(--bg-card);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s var(--ease), color 0.2s, border-color 0.2s, transform 0.15s;
      user-select: none;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--bg-hover);
      color: var(--text-1);
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: var(--accent);
      color: #0e0e16;
      border-color: var(--accent);
      pointer-events: none;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-ellipsis {
      color: var(--text-3);
      font-weight: 700;
      padding: 0 4px;
      user-select: none;
    }

    /* ===== RECENT COMMENTS ===== */
    .recent-comments-container {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .recent-comment-item {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      display: flex;
      overflow: hidden;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .recent-comment-item:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.2);
    }

    .recent-comment-cover-link {
      flex-shrink: 0;
      display: block;
      width: 68px;
    }

    .recent-comment-cover {
      width: 68px;
      height: 100%;
      min-height: 92px;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s var(--ease);
    }

    .recent-comment-cover:hover {
      opacity: 0.82;
    }

    .recent-comment-body {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .recent-comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .recent-comment-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .recent-comment-author {
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-comment-time {
      color: var(--text-3);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .recent-comment-text {
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .recent-comment-target {
      font-size: 11px;
      color: var(--text-3);
    }

    .recent-comment-target a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }

    .recent-comment-target a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .recent-comment-cover-link {
        display: none;
      }

      .recent-comment-body {
        padding: 11px 13px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="logo">tên web</a>
      <nav class="main-nav" id="top-nav"></nav>
    </div>
  </header>

  <!-- ===== CAROUSEL ===== -->
  <div class="carousel-section">
    <div class="carousel-track-area">
      <div class="carousel-wrapper" id="hero-carousel">
        <div
          style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3);font-size:14px;">
          Đang tải truyện nổi bật...</div>
      </div>
      <button class="carousel-nav-btn carousel-prev" id="carousel-prev">❮</button>
      <button class="carousel-nav-btn carousel-next" id="carousel-next">❯</button>
    </div>
    <div class="carousel-dots" id="carousel-dots"></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="Nhập tên truyện cần tìm...">
    <select id="tagFilter">
      <option value="all">Tất cả thể loại</option>
    </select>
  </div>

  <div class="section-title">DANH SÁCH TRUYỆN MỚI</div>

  <div class="post-grid-layout" id="latest-stories-grid">
    <p style="text-align: center; width: 100%; color: #aaa; grid-column: 1/-1;">Đang đồng bộ dữ liệu từ đám mây...</p>
  </div>

  <div class="pagination-container" id="pagination-block"></div>

  <div class="section-title" style="margin-top: 50px;">BÌNH LUẬN GẦN ĐÂY</div>
  <div class="recent-comments-container" id="recent-comments-block">
    <p style="text-align: center; width: 100%; color: #aaa;">Đang tải bình luận mới nhất...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, doc, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
      authDomain: "web-truyen-3769d.firebaseapp.com",
      projectId: "web-truyen-3769d",
      storageBucket: "web-truyen-3769d.firebasestorage.app",
      messagingSenderId: "613339406890",
      appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const topNav = document.getElementById('top-nav');
    onAuthStateChanged(auth, (user) => {
      if (user) {
        topNav.innerHTML = `
                    <a href="profile.html?uid=${user.uid}">Hồ Sơ</a>
                    <a href="add-story.html">Đăng Truyện</a>
                    <a href="#" id="btnLogout">Đăng Xuất</a>
                `;
        document.getElementById('btnLogout').addEventListener('click', (e) => {
          e.preventDefault();
          signOut(auth).then(() => { window.location.reload(); });
        });
      } else {
        topNav.innerHTML = `
                    <a href="login.html">Đăng Nhập</a>
                    <a href="register.html">Đăng Ký</a>
                `;
      }
    });

    let allStoriesArray = [];
    let currentFilteredData = [];

    let currentPage = 1;
    const ITEMS_PER_PAGE = 10;

    const storiesGrid = document.getElementById('latest-stories-grid');
    const searchInput = document.getElementById('searchInput');
    const tagFilter = document.getElementById('tagFilter');
    const paginationBlock = document.getElementById('pagination-block');

    function escapeHTML(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateView() {
      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIndex = startIndex + ITEMS_PER_PAGE;
      const chunk = currentFilteredData.slice(startIndex, endIndex);

      storiesGrid.innerHTML = "";
      if (chunk.length === 0) {
        storiesGrid.innerHTML = "<div class='empty-msg'>Không tìm thấy bộ truyện nào.</div>";
        paginationBlock.innerHTML = "";
        return;
      }

      const htmlParts = [];
      chunk.forEach(story => {
        const dateStr = story.createdAt ? new Date(story.createdAt).toLocaleDateString('vi-VN') : 'N/A';

        let statusClass = 'status-ongoing';
        if (story.status === 'Hoàn Thành') statusClass = 'status-completed';
        if (story.status === 'Tạm Dừng') statusClass = 'status-paused';

        let tagsHTML = "";
        if (story.tags && Array.isArray(story.tags) && story.tags.length > 0) {
          const displayTags = story.tags.slice(0, 2);
          displayTags.forEach(tag => {
            tagsHTML += `<span class="tag-badge">${escapeHTML(tag)}</span>`;
          });
          if (story.tags.length > 2) {
            tagsHTML += `<span class="tag-badge plus-tag">+${story.tags.length - 2}</span>`;
          }
        }

        const uploaderName = escapeHTML(story.uploaderName || "Ẩn danh");
        const uploaderAvatar = story.uploaderAvatar || "https://www.w3schools.com/howto/img_avatar.png";
        const viewCount = story.views || 0;
        const likeCount = story.likeCount || 0;

        htmlParts.push(`
            <div class="grid-item">
                <a href="info.html?id=${story.id}" class="post-link">
                    <div class="card-header">
                        <div class="card-uploader">
                            <img src="${uploaderAvatar}" alt="Avatar" loading="lazy">
                            <span class="card-uploader-name">${uploaderName}</span>
                        </div>
                        <div class="card-date">${dateStr}</div>
                    </div>

                    <div class="post-thumbnail">
                        <img src="${story.coverImage}" alt="Cover" loading="lazy">
                        <div class="thumbnail-gradient"></div>
                        <div class="status-badge ${statusClass}">${escapeHTML(story.status)}</div>
                        <div class="tags-overlay">${tagsHTML}</div>
                    </div>

                    <h3 class="post-title">${escapeHTML(story.title)}</h3>

                    <div class="card-footer">
                        <div class="stat-item"><span style="font-size: 16px;">👁️</span> ${viewCount}</div>
                        <div class="stat-item"><span style="font-size: 14px;">❤️</span> ${likeCount}</div>
                    </div>
                </a>
            </div>
        `);
      });
      storiesGrid.innerHTML = htmlParts.join('');

      renderPagination(currentFilteredData.length);
    }

    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
      paginationBlock.innerHTML = '';

      if (totalPages <= 1) return;

      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.innerHTML = '❮';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; updateView(); window.scrollTo(0, 0); } };
      paginationBlock.appendChild(prevBtn);

      const maxVisibleButtons = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisibleButtons / 2));
      let endPage = startPage + maxVisibleButtons - 1;

      if (endPage > totalPages) {
        endPage = totalPages;
        startPage = Math.max(1, endPage - maxVisibleButtons + 1);
      }

      if (startPage > 1) {
        paginationBlock.appendChild(createPageBtn(1));
        if (startPage > 2) {
          const span = document.createElement('span'); span.className = 'page-ellipsis'; span.innerText = '...'; paginationBlock.appendChild(span);
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        paginationBlock.appendChild(createPageBtn(i));
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const span = document.createElement('span'); span.className = 'page-ellipsis'; span.innerText = '...'; paginationBlock.appendChild(span);
        }
        paginationBlock.appendChild(createPageBtn(totalPages));
      }

      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.innerHTML = '❯';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; updateView(); window.scrollTo(0, 0); } };
      paginationBlock.appendChild(nextBtn);
    }

    function createPageBtn(pageNum) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${pageNum === currentPage ? 'active' : ''}`;
      btn.innerText = pageNum;
      btn.onclick = () => { currentPage = pageNum; updateView(); window.scrollTo(0, 0); };
      return btn;
    }

    function applyFilters() {
      const searchText = searchInput.value.toLowerCase().trim();
      const selectedTag = tagFilter.value;

      currentFilteredData = allStoriesArray.filter(story => {
        const matchSearch = story.title.toLowerCase().includes(searchText);
        const matchTag = selectedTag === "all" || (story.tags && story.tags.includes(selectedTag));
        return matchSearch && matchTag;
      });

      currentPage = 1;
      updateView();
    }

    searchInput.addEventListener('input', applyFilters);
    tagFilter.addEventListener('change', applyFilters);

    function populateDynamicTags() {
      let allTagsRaw = [];
      allStoriesArray.forEach(story => {
        if (story.tags && Array.isArray(story.tags)) allTagsRaw = allTagsRaw.concat(story.tags);
      });
      const uniqueTags = [...new Set(allTagsRaw)].sort();
      tagFilter.innerHTML = '<option value="all">Tất cả thể loại</option>';
      uniqueTags.forEach(tag => { tagFilter.innerHTML += `<option value="${tag}">${tag}</option>`; });
    }

    async function fetchRecentComments() {
      const commentsBlock = document.getElementById('recent-comments-block');
      try {
        const q = query(collection(db, "comments"), orderBy("createdAt", "desc"), limit(10));
        const snap = await getDocs(q);

        if (snap.empty) {
          commentsBlock.innerHTML = "<p style='text-align: center; width: 100%; color: #aaa;'>Chưa có bình luận nào.</p>";
          return;
        }

        const comments = [];
        snap.forEach(docSnap => comments.push({ id: docSnap.id, ...docSnap.data() }));

        // Build story lookup from already-loaded allStoriesArray (zero extra Firestore reads)
        const storyMap = {};
        allStoriesArray.forEach(s => { storyMap[s.id] = s; });

        // For chapter-type comments, batch-fetch chapters in parallel to get storyId
        const chapterIds = [...new Set(
          comments.filter(c => c.targetType === 'chapter').map(c => c.targetId)
        )];
        const chapterStoryMap = {};
        if (chapterIds.length > 0) {
          const chapterDocs = await Promise.all(
            chapterIds.map(cid => getDoc(doc(db, "chapters", cid)))
          );
          chapterDocs.forEach((cdoc, i) => {
            if (cdoc.exists()) chapterStoryMap[chapterIds[i]] = cdoc.data().storyId;
          });
        }

        let html = "";
        comments.forEach(c => {
          const dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
          const avatar = c.avatar || "https://www.w3schools.com/howto/img_avatar.png";
          const targetUrl = c.targetType === 'story'
            ? `info.html?id=${c.targetId}`
            : `read.html?chapterId=${c.targetId}`;

          const storyId = c.targetType === 'story' ? c.targetId : chapterStoryMap[c.targetId];
          const story = storyId ? storyMap[storyId] : null;
          const coverImage = story ? story.coverImage : '';
          const storyTitle = story ? story.title : '';
          const storyUrl = storyId ? `info.html?id=${storyId}` : targetUrl;

          let formattedContent = escapeHTML(c.content);
          if (c.replyToName && c.replyToUid) {
            const tagString = `@${escapeHTML(c.replyToName)}`;
            if (formattedContent.startsWith(tagString)) {
              const hyperlinkTag = `<a href="profile.html?uid=${c.replyToUid}" style="color: #4da6ff; text-decoration: none; font-weight: bold;">${tagString}</a>`;
              formattedContent = formattedContent.replace(tagString, hyperlinkTag);
            }
          }

          const coverHtml = coverImage
            ? `<a href="${storyUrl}" class="recent-comment-cover-link" title="${escapeHTML(storyTitle)}">
                 <img src="${coverImage}" alt="${escapeHTML(storyTitle)}" class="recent-comment-cover" loading="lazy">
               </a>`
            : '';

          const targetLabel = storyTitle
            ? `<a href="${storyUrl}">${escapeHTML(storyTitle)}</a>`
            : c.targetType === 'story'
              ? `<a href="${targetUrl}">trang thông tin truyện</a>`
              : `<a href="${targetUrl}">chương truyện</a>`;

          html += `
                    <div class="recent-comment-item">
                        <div class="recent-comment-body">
                            <div class="recent-comment-header">
                                <a href="profile.html?uid=${c.userId}">
                                    <img src="${avatar}" alt="Avatar" class="recent-comment-avatar" loading="lazy">
                                </a>
                                <a href="profile.html?uid=${c.userId}" class="recent-comment-author">${escapeHTML(c.displayName)}</a>
                                <span class="recent-comment-time">${dateStr}</span>
                            </div>
                            <div class="recent-comment-text">${formattedContent}</div>
                            <div class="recent-comment-target">
                                Đã bình luận trong ${targetLabel}
                            </div>
                        </div>
                        ${coverHtml}
                    </div>
                `;
        });
        commentsBlock.innerHTML = html;
      } catch (e) {
        console.error("Lỗi kéo comment:", e);
        commentsBlock.innerHTML = "<p style='color:#ff5555; text-align:center;'>Lỗi kết nối bình luận.</p>";
      }
    }

    function buildCarousel(stories) {
      const top5 = stories.slice(0, 5);
      const wrapper = document.getElementById('hero-carousel');
      const dotsContainer = document.getElementById('carousel-dots');
      const prevBtn = document.getElementById('carousel-prev');
      const nextBtn = document.getElementById('carousel-next');

      if (top5.length === 0) return;

      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';

      let currentSlide = 0;
      let autoTimer;

      wrapper.innerHTML = '';
      dotsContainer.innerHTML = '';

      top5.forEach((story, i) => {
        const allTags = story.tags || [];
        const displayTags = allTags.slice(0, 2);
        let tagsHTML = displayTags.map(t => `<span class="tag-badge">${t}</span>`).join('');
        if (allTags.length > 2) tagsHTML += `<span class="tag-badge plus-tag">+${allTags.length - 2}</span>`;

        const slide = document.createElement('div');
        slide.className = `carousel-slide${i === 0 ? ' active' : ''}`;
        slide.innerHTML = `
          <div class="carousel-bg" style="background-image:url('${story.coverImage}')"></div>
          <div class="carousel-content">
            <img src="${story.coverImage}" class="carousel-cover" alt="${story.title}">
            <div class="carousel-info">
              <div class="carousel-label">Truyện Nổi Bật</div>
              <div class="carousel-title">${story.title}</div>
              <div class="carousel-tags">${tagsHTML}</div>
              <div class="carousel-stats">
                <span>👁️ ${(story.views || 0).toLocaleString('vi-VN')}</span>
                <span>❤️ ${(story.likeCount || 0).toLocaleString('vi-VN')}</span>
              </div>
              <a href="info.html?id=${story.id}" class="carousel-read-btn">▶ Đọc Ngay</a>
            </div>
          </div>
        `;
        wrapper.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = `carousel-dot${i === 0 ? ' active' : ''}`;
        dot.setAttribute('aria-label', `Slide ${i + 1}`);
        dot.addEventListener('click', () => { goTo(i); resetTimer(); });
        dotsContainer.appendChild(dot);
      });

      const slides = wrapper.querySelectorAll('.carousel-slide');
      const dots = dotsContainer.querySelectorAll('.carousel-dot');

      function goTo(index) {
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = ((index % top5.length) + top5.length) % top5.length;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
      }

      prevBtn.addEventListener('click', () => { goTo(currentSlide - 1); resetTimer(); });
      nextBtn.addEventListener('click', () => { goTo(currentSlide + 1); resetTimer(); });

      function resetTimer() {
        clearInterval(autoTimer);
        autoTimer = setInterval(() => goTo(currentSlide + 1), 4500);
      }

      resetTimer();
      wrapper.addEventListener('mouseenter', () => clearInterval(autoTimer));
      wrapper.addEventListener('mouseleave', resetTimer);
    }

    async function fetchStories() {
      try {
        const storiesRef = collection(db, "stories");

        // Carousel riêng: top 5 theo lượt xem
        const carouselQ = query(storiesRef, orderBy("views", "desc"), limit(5));
        const carouselSnap = await getDocs(carouselQ);
        const carouselStories = [];
        carouselSnap.forEach(doc => carouselStories.push({ id: doc.id, ...doc.data() }));
        buildCarousel(carouselStories);

        // Danh sách truyện: tất cả, mới nhất trước
        const q = query(storiesRef, orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        querySnapshot.forEach((doc) => {
          allStoriesArray.push({ id: doc.id, ...doc.data() });
        });

        currentFilteredData = allStoriesArray;
        updateView();
        populateDynamicTags();
        fetchRecentComments();

      } catch (error) {
        console.error("Lỗi kéo dữ liệu: ", error);
        storiesGrid.innerHTML = "<div class='empty-msg'>Lỗi kết nối máy chủ.</div>";
      }
    }

    fetchStories();
  </script>
