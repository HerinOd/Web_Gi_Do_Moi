<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mã Đề 0099 - Nền Tảng Đọc Truyện Trực Tuyến</title>
  <link rel="stylesheet" href="style.css">
  <style>

    /* ===== LIBRARY TOOLBAR ===== */
    .library-toolbar {
      max-width: 1200px;
      margin: 0 auto 22px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar-title {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 19px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }

    .toolbar-title::before {
      content: '';
      width: 4px;
      height: 21px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .toolbar-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-wrap { position: relative; flex: 1; }

    .search-wrap .search-ic {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 14px;
      pointer-events: none;
      line-height: 1;
    }

    .search-wrap input {
      width: 260px;
      max-width: 100%;
      padding: 10px 16px 10px 38px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-1);
      border-radius: 99px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .search-wrap input::placeholder { color: var(--text-3); }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

    #tagFilter {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-1);
      border-radius: 99px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      max-width: 175px;
      text-overflow: ellipsis;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    #tagFilter:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

    /* ===== SECTION TITLE ===== */
    .section-title {
      max-width: 1200px;
      margin: 0 auto 22px;
      padding: 0 20px 14px;
      color: var(--text-1);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ===== GRID 5 CỘT ===== */
    .post-grid-layout {
      max-width: 1200px;
      margin: 0 auto 30px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      .post-grid-layout {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .post-grid-layout {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .library-toolbar { flex-direction: column; align-items: stretch; gap: 14px; }
      .toolbar-controls { width: 100%; }
      .search-wrap input { width: 100%; }
      #tagFilter { flex-shrink: 0; }
    }

    /* ===== CARD ===== */
    .grid-item {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
      display: flex;
      flex-direction: column;
    }

    .grid-item:hover {
      transform: translateY(-7px);
      border-color: var(--accent);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--accent-glow);
    }

    .post-link {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
      color: inherit;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 11px;
      font-size: 11px;
      border-bottom: 1px solid var(--border-muted);
    }

    .card-uploader {
      display: flex;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    .card-uploader img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
    }

    .card-uploader-name {
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }

    .card-date {
      color: var(--text-3);
      white-space: nowrap;
      font-size: 11px;
    }

    .post-thumbnail {
      position: relative;
      width: 100%;
      padding-top: 133%;
      overflow: hidden;
      background: var(--bg-hover);
    }

    .post-thumbnail > img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--ease);
    }

    .grid-item:hover .post-thumbnail > img {
      transform: scale(1.06);
    }

    .status-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 9px;
      border-radius: var(--radius-xs);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      z-index: 2;
      backdrop-filter: blur(4px);
    }

    .status-ongoing {
      background: rgba(61, 220, 132, 0.85);
    }

    .status-completed {
      background: rgba(91, 163, 224, 0.85);
    }

    .status-paused {
      background: rgba(255, 94, 108, 0.85);
    }

    .cover-uploader {
      position: absolute;
      bottom: 9px;
      left: 10px;
      right: 10px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .cover-uploader img {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .cover-uploader span {
      font-size: 11px;
      font-weight: 600;
      color: #eef3f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.65);
    }

    .tag-badge {
      background: rgba(65, 84, 93, 0.9);
      color: #dbe6ec;
      padding: 2px 7px;
      border-radius: var(--radius-xs);
      font-size: 10px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .tag-badge.plus-tag {
      background: rgba(91, 163, 224, 0.9);
      color: #121a28;
    }

    .thumbnail-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(0deg, rgba(18, 26, 40, 0.92) 0%, transparent 100%);
      z-index: 1;
    }

    .card-body {
      padding: 11px 12px 9px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .post-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .card-tag {
      font-size: 10px;
      font-weight: 600;
      color: #cdd9e2;
      background: var(--bg-hover);
      border: 1px solid var(--border-muted);
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      color: var(--text-2);
      border-top: 1px solid var(--border-muted);
      font-size: 12px;
      background: var(--bg-surface);
    }

    .card-stats {
      display: flex;
      gap: 12px;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }

    .ic {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      vertical-align: -2px;
    }

    .ic-heart { color: var(--red); width: 13px; height: 13px; }

    /* ===== CAROUSEL ===== */
    .carousel-section {
      margin: 0 0 36px;
      padding: 84px 20px 0;
    }

    .carousel-track-area {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
    }

    .carousel-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      height: 400px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      transition: opacity 0.55s var(--ease);
      pointer-events: none;
    }

    .carousel-slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .carousel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(26px) brightness(0.5) saturate(120%);
      transform: scale(1.14);
    }

    .carousel-scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(18, 26, 40, 0.94) 0%, rgba(18, 26, 40, 0.7) 42%, rgba(18, 26, 40, 0.32) 100%),
        linear-gradient(0deg, rgba(18, 26, 40, 0.6) 0%, transparent 45%);
      z-index: 0;
    }

    .carousel-content {
      position: relative;
      z-index: 1;
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 80px;
      gap: 40px;
      align-items: center;
    }

    .carousel-cover {
      width: 190px;
      height: 272px;
      object-fit: cover;
      border-radius: var(--radius);
      flex-shrink: 0;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .carousel-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .carousel-label {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      width: fit-content;
    }

    .carousel-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
    }

    .carousel-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      letter-spacing: -0.5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .carousel-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .carousel-stats {
      display: flex;
      gap: 22px;
      color: rgba(236, 239, 243, 0.65);
      font-size: 14px;
      font-weight: 600;
    }

    .carousel-read-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 30px;
      background: var(--accent);
      color: #121a28;
      font-weight: 700;
      font-size: 14px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      width: fit-content;
      margin-top: 4px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .carousel-read-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(91, 163, 224, 0.38);
    }

    .carousel-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(18, 26, 40, 0.6);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .carousel-nav-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #121a28;
      transform: translateY(-50%) scale(1.1);
    }

    .carousel-prev {
      left: 20px;
    }

    .carousel-next {
      right: 20px;
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 13px;
    }

    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 4px;
      background: var(--border);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.25s, width 0.3s var(--ease);
    }

    .carousel-dot.active {
      background: var(--accent);
      width: 24px;
    }

    @media (max-width: 900px) {
      .carousel-content { padding: 32px 48px; gap: 32px; }
    }

    @media (max-width: 700px) {
      .carousel-nav-btn { display: none !important; }
      .carousel-wrapper { height: 300px; }
      .carousel-content { padding: 24px 24px; gap: 20px; }
      .carousel-cover { width: 116px; height: 169px; }
      .carousel-title { font-size: 19px; }
      .carousel-read-btn { padding: 10px 20px; font-size: 13px; }
    }

    @media (max-width: 480px) {
      .carousel-wrapper { height: 260px; }
      .carousel-content { padding: 18px 16px; gap: 14px; }
      .carousel-cover { width: 88px; height: 128px; }
      .carousel-title { font-size: 15px; -webkit-line-clamp: 3; }
      .carousel-stats { font-size: 12px; gap: 12px; }
      .carousel-read-btn { padding: 8px 16px; font-size: 12px; margin-top: 0; }
      .carousel-info { gap: 9px; }
      .carousel-label { font-size: 10px; letter-spacing: 2px; }
    }

    /* ===== EMPTY ===== */
    .empty-msg {
      text-align: center;
      color: var(--text-2);
      width: 100%;
      grid-column: 1 / -1;
      padding: 60px 0;
      font-size: 16px;
    }

    /* ===== PAGINATION ===== */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 10px auto 50px;
      flex-wrap: wrap;
      max-width: 1200px;
      padding: 0 20px;
    }

    .page-btn {
      padding: 8px 15px;
      background: var(--bg-card);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s var(--ease), color 0.2s, border-color 0.2s, transform 0.15s;
      user-select: none;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--bg-hover);
      color: var(--text-1);
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: var(--accent);
      color: #121a28;
      border-color: var(--accent);
      pointer-events: none;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-ellipsis {
      color: var(--text-3);
      font-weight: 700;
      padding: 0 4px;
      user-select: none;
    }

    /* ===== RECENT COMMENTS ===== */
    .recent-comments-container {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (max-width: 760px) {
      .recent-comments-container { grid-template-columns: 1fr; }
    }

    .recent-comment-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), transform 0.2s var(--ease);
    }

    .recent-comment-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
    }

    .rc-head { display: flex; align-items: center; gap: 10px; }

    .recent-comment-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .rc-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; line-height: 1.35; }

    .recent-comment-author {
      font-weight: 700;
      color: var(--text-1);
      text-decoration: none;
      font-size: 13.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .recent-comment-author:hover { color: var(--accent); }

    .recent-comment-time {
      color: var(--text-3);
      font-size: 11px;
      white-space: nowrap;
    }

    .recent-comment-text {
      color: var(--text-2);
      font-size: 13.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .rc-target {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 11px;
      border-top: 1px solid var(--border-muted);
    }

    .rc-target-cover {
      width: 30px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .rc-target-text {
      font-size: 12px;
      color: var(--text-3);
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rc-target-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .rc-target-text a:hover { text-decoration: underline; }

    /* ===== ANNOUNCEMENT BANNER ===== */
    .announcement-banner {
      max-width: 1200px;
      margin: 0 auto 22px;
      padding: 0 20px;
    }

    .announcement-content {
      background: rgba(91, 163, 224, 0.05);
      border: 1px solid rgba(91, 163, 224, 0.28);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    #announcement-text {
      flex: 1;
      min-width: 0;
    }

    .announcement-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      padding: 4px 10px;
      background: var(--accent-dim);
      border-radius: 99px;
      border: 1px solid var(--accent-glow);
    }

    #announcement-text {
      color: var(--text-1);
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="logo">Mã Đề 0099</a>
      <nav class="main-nav" id="top-nav"></nav>
      <button class="menu-toggle" id="menu-toggle" aria-label="Mở menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3.5" y1="7" x2="20.5" y2="7"/><line x1="3.5" y1="12" x2="20.5" y2="12"/><line x1="3.5" y1="17" x2="20.5" y2="17"/></svg></button>
    </div>
  </header>

  <div class="nav-overlay" id="nav-overlay">
    <span class="close-btn" id="close-nav">&times;</span>
    <div class="nav-content" id="nav-overlay-content"></div>
  </div>

  <!-- ===== CAROUSEL ===== -->
  <div class="carousel-section">
    <div class="carousel-track-area">
      <div class="carousel-wrapper" id="hero-carousel">
        <div
          style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3);font-size:14px;">
          Đang tải truyện nổi bật...</div>
      </div>
      <button class="carousel-nav-btn carousel-prev" id="carousel-prev">❮</button>
      <button class="carousel-nav-btn carousel-next" id="carousel-next">❯</button>
    </div>
    <div class="carousel-dots" id="carousel-dots"></div>
  </div>

  <div class="announcement-banner" id="announcement-banner" style="display:none;">
    <div class="announcement-content">
      <span class="announcement-label">📢 Thông báo</span>
      <span id="announcement-text"></span>
    </div>
  </div>

  <div class="library-toolbar">
    <div class="toolbar-title">Truyện mới</div>
    <div class="toolbar-controls">
      <div class="search-wrap">
        <span class="search-ic">🔍</span>
        <input type="text" id="searchInput" placeholder="Tìm truyện...">
      </div>
      <select id="tagFilter">
        <option value="all">Tất cả thể loại</option>
      </select>
    </div>
  </div>

  <div class="post-grid-layout" id="latest-stories-grid">
    <p style="text-align: center; width: 100%; color: #9aa7bc; grid-column: 1/-1;">Đang đồng bộ dữ liệu từ đám mây...</p>
  </div>

  <div class="pagination-container" id="pagination-block"></div>

  <div class="library-toolbar" style="margin-top: 46px;">
    <div class="toolbar-title">Bình luận gần đây</div>
  </div>
  <div class="recent-comments-container" id="recent-comments-block">
    <p style="text-align: center; width: 100%; color: #9aa7bc;">Đang tải bình luận mới nhất...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, doc, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
      authDomain: "web-truyen-3769d.firebaseapp.com",
      projectId: "web-truyen-3769d",
      storageBucket: "web-truyen-3769d.firebasestorage.app",
      messagingSenderId: "613339406890",
      appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const topNav = document.getElementById('top-nav');
    const navOverlay = document.getElementById('nav-overlay');
    const navOverlayContent = document.getElementById('nav-overlay-content');

    onAuthStateChanged(auth, async (user) => {
      let linksHTML;
      if (user) {
        // Chỉ Admin / Dịch Giả mới thấy nút Đăng Truyện
        let canUpload = false;
        try {
          const userSnap = await getDoc(doc(db, "users", user.uid));
          const role = userSnap.exists() ? userSnap.data().role : "user";
          canUpload = (role === "admin" || role === "translator");
        } catch (e) { canUpload = false; }

        linksHTML = `
          <a href="profile.html?uid=${user.uid}">Hồ Sơ</a>
          ${canUpload ? '<a href="add-story.html">Đăng Truyện</a>' : ''}
          <a href="#" class="btn-logout">Đăng Xuất</a>
        `;
      } else {
        linksHTML = `
          <a href="login.html">Đăng Nhập</a>
          <a href="register.html">Đăng Ký</a>
        `;
      }
      topNav.innerHTML = linksHTML;
      navOverlayContent.innerHTML = linksHTML;

      document.querySelectorAll('.btn-logout').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          signOut(auth).then(() => { window.location.reload(); });
        });
      });
    });

    const menuToggle = document.getElementById('menu-toggle');
    const closeNav = document.getElementById('close-nav');

    menuToggle.addEventListener('click', () => navOverlay.classList.add('active'));
    closeNav.addEventListener('click', () => navOverlay.classList.remove('active'));
    navOverlay.addEventListener('click', (e) => {
      if (e.target === navOverlay) navOverlay.classList.remove('active');
    });
    navOverlayContent.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') navOverlay.classList.remove('active');
    });

    let allStoriesArray = [];
    let currentFilteredData = [];

    let currentPage = 1;
    const ITEMS_PER_PAGE = 10;

    const storiesGrid = document.getElementById('latest-stories-grid');
    const searchInput = document.getElementById('searchInput');
    const tagFilter = document.getElementById('tagFilter');
    const paginationBlock = document.getElementById('pagination-block');

    function escapeHTML(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    const ICON_EYE = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const ICON_HEART = `<svg class="ic ic-heart" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 20.3l-1.45-1.32C5.4 14.25 2 11.18 2 7.4 2 4.42 4.42 2 7.4 2c1.74 0 3.41.81 4.6 2.09C13.19 2.81 14.86 2 16.6 2 19.58 2 22 4.42 22 7.4c0 3.78-3.4 6.85-8.55 11.59L12 20.3z"/></svg>`;

    function updateView() {
      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIndex = startIndex + ITEMS_PER_PAGE;
      const chunk = currentFilteredData.slice(startIndex, endIndex);

      storiesGrid.innerHTML = "";
      if (chunk.length === 0) {
        storiesGrid.innerHTML = "<div class='empty-msg'>Không tìm thấy bộ truyện nào.</div>";
        paginationBlock.innerHTML = "";
        return;
      }

      const htmlParts = [];
      chunk.forEach(story => {
        const dateStr = story.createdAt ? new Date(story.createdAt).toLocaleDateString('vi-VN') : 'N/A';

        let statusClass = 'status-ongoing';
        if (story.status === 'Hoàn Thành') statusClass = 'status-completed';
        if (story.status === 'Tạm Dừng') statusClass = 'status-paused';

        let tagsHTML = "";
        if (story.tags && Array.isArray(story.tags) && story.tags.length > 0) {
          const displayTags = story.tags.slice(0, 2);
          displayTags.forEach(tag => {
            tagsHTML += `<span class="card-tag">${escapeHTML(tag)}</span>`;
          });
          if (story.tags.length > 2) {
            tagsHTML += `<span class="card-tag">+${story.tags.length - 2}</span>`;
          }
        }

        const uploaderName = escapeHTML(story.uploaderName || "Ẩn danh");
        const uploaderAvatar = story.uploaderAvatar || "https://www.w3schools.com/howto/img_avatar.png";
        const viewCount = story.views || 0;
        const likeCount = story.likeCount || 0;

        htmlParts.push(`
            <div class="grid-item">
                <a href="info.html?id=${story.id}" class="post-link">
                    <div class="post-thumbnail">
                        <img src="${story.coverImage}" alt="Cover" loading="lazy">
                        <div class="thumbnail-gradient"></div>
                        <div class="status-badge ${statusClass}">${escapeHTML(story.status)}</div>
                        <div class="cover-uploader">
                            <img src="${uploaderAvatar}" alt="" loading="lazy">
                            <span>${uploaderName}</span>
                        </div>
                    </div>

                    <div class="card-body">
                        <h3 class="post-title">${escapeHTML(story.title)}</h3>
                        <div class="tags-row">${tagsHTML}</div>
                    </div>

                    <div class="card-footer">
                        <div class="card-stats">
                            <span class="stat-item" title="Lượt xem">${ICON_EYE} ${viewCount}</span>
                            <span class="stat-item" title="Lượt thích">${ICON_HEART} ${likeCount}</span>
                        </div>
                        <span class="card-date">${dateStr}</span>
                    </div>
                </a>
            </div>
        `);
      });
      storiesGrid.innerHTML = htmlParts.join('');

      renderPagination(currentFilteredData.length);
    }

    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
      paginationBlock.innerHTML = '';

      if (totalPages <= 1) return;

      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.innerHTML = '❮';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; updateView(); window.scrollTo(0, 0); } };
      paginationBlock.appendChild(prevBtn);

      const maxVisibleButtons = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisibleButtons / 2));
      let endPage = startPage + maxVisibleButtons - 1;

      if (endPage > totalPages) {
        endPage = totalPages;
        startPage = Math.max(1, endPage - maxVisibleButtons + 1);
      }

      if (startPage > 1) {
        paginationBlock.appendChild(createPageBtn(1));
        if (startPage > 2) {
          const span = document.createElement('span'); span.className = 'page-ellipsis'; span.innerText = '...'; paginationBlock.appendChild(span);
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        paginationBlock.appendChild(createPageBtn(i));
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const span = document.createElement('span'); span.className = 'page-ellipsis'; span.innerText = '...'; paginationBlock.appendChild(span);
        }
        paginationBlock.appendChild(createPageBtn(totalPages));
      }

      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.innerHTML = '❯';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; updateView(); window.scrollTo(0, 0); } };
      paginationBlock.appendChild(nextBtn);
    }

    function createPageBtn(pageNum) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${pageNum === currentPage ? 'active' : ''}`;
      btn.innerText = pageNum;
      btn.onclick = () => { currentPage = pageNum; updateView(); window.scrollTo(0, 0); };
      return btn;
    }

    function applyFilters() {
      const searchText = searchInput.value.toLowerCase().trim();
      const selectedTag = tagFilter.value;

      currentFilteredData = allStoriesArray.filter(story => {
        const matchSearch = story.title.toLowerCase().includes(searchText);
        const matchTag = selectedTag === "all" || (story.tags && story.tags.includes(selectedTag));
        return matchSearch && matchTag;
      });

      currentPage = 1;
      updateView();
    }

    searchInput.addEventListener('input', applyFilters);
    tagFilter.addEventListener('change', applyFilters);

    function populateDynamicTags() {
      let allTagsRaw = [];
      allStoriesArray.forEach(story => {
        if (story.tags && Array.isArray(story.tags)) allTagsRaw = allTagsRaw.concat(story.tags);
      });
      const uniqueTags = [...new Set(allTagsRaw)].sort();
      tagFilter.innerHTML = '<option value="all">Tất cả thể loại</option>';
      uniqueTags.forEach(tag => { tagFilter.innerHTML += `<option value="${tag}">${tag}</option>`; });
    }

    async function fetchRecentComments() {
      const commentsBlock = document.getElementById('recent-comments-block');
      try {
        const q = query(collection(db, "comments"), orderBy("createdAt", "desc"), limit(10));
        const snap = await getDocs(q);

        if (snap.empty) {
          commentsBlock.innerHTML = "<p style='text-align: center; width: 100%; color: #9aa7bc;'>Chưa có bình luận nào.</p>";
          return;
        }

        const comments = [];
        snap.forEach(docSnap => comments.push({ id: docSnap.id, ...docSnap.data() }));

        // Build story lookup from already-loaded allStoriesArray (zero extra Firestore reads)
        const storyMap = {};
        allStoriesArray.forEach(s => { storyMap[s.id] = s; });

        // For chapter-type comments, batch-fetch chapters in parallel to get storyId
        const chapterIds = [...new Set(
          comments.filter(c => c.targetType === 'chapter').map(c => c.targetId)
        )];
        const chapterStoryMap = {};
        if (chapterIds.length > 0) {
          const chapterDocs = await Promise.all(
            chapterIds.map(cid => getDoc(doc(db, "chapters", cid)))
          );
          chapterDocs.forEach((cdoc, i) => {
            if (cdoc.exists()) chapterStoryMap[chapterIds[i]] = cdoc.data().storyId;
          });
        }

        let html = "";
        comments.forEach(c => {
          const dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
          const avatar = c.avatar || "https://www.w3schools.com/howto/img_avatar.png";
          const targetUrl = c.targetType === 'story'
            ? `info.html?id=${c.targetId}`
            : `read.html?chapterId=${c.targetId}`;

          const storyId = c.targetType === 'story' ? c.targetId : chapterStoryMap[c.targetId];
          const story = storyId ? storyMap[storyId] : null;
          const coverImage = story ? story.coverImage : '';
          const storyTitle = story ? story.title : '';
          const storyUrl = storyId ? `info.html?id=${storyId}` : targetUrl;

          let formattedContent = escapeHTML(c.content);
          if (c.replyToName && c.replyToUid) {
            const tagString = `@${escapeHTML(c.replyToName)}`;
            if (formattedContent.startsWith(tagString)) {
              const hyperlinkTag = `<a href="profile.html?uid=${c.replyToUid}" style="color: #5ba3e0; text-decoration: none; font-weight: bold;">${tagString}</a>`;
              formattedContent = formattedContent.replace(tagString, hyperlinkTag);
            }
          }

          const coverHtml = coverImage
            ? `<a href="${storyUrl}" title="${escapeHTML(storyTitle)}"><img src="${coverImage}" alt="" class="rc-target-cover" loading="lazy"></a>`
            : '';

          const targetLabel = storyTitle
            ? `<a href="${targetUrl}">${escapeHTML(storyTitle)}</a>`
            : c.targetType === 'story'
              ? `<a href="${targetUrl}">trang thông tin truyện</a>`
              : `<a href="${targetUrl}">chương truyện</a>`;

          html += `
                    <div class="recent-comment-item">
                        <div class="rc-head">
                            <a href="profile.html?uid=${c.userId}">
                                <img src="${avatar}" alt="Avatar" class="recent-comment-avatar" loading="lazy">
                            </a>
                            <div class="rc-meta">
                                <a href="profile.html?uid=${c.userId}" class="recent-comment-author">${escapeHTML(c.displayName)}</a>
                                <span class="recent-comment-time">${dateStr}</span>
                            </div>
                        </div>
                        <div class="recent-comment-text">${formattedContent}</div>
                        <div class="rc-target">
                            ${coverHtml}
                            <span class="rc-target-text">Trong ${targetLabel}</span>
                        </div>
                    </div>
                `;
        });
        commentsBlock.innerHTML = html;
      } catch (e) {
        console.error("Lỗi kéo comment:", e);
        commentsBlock.innerHTML = "<p style='color:#ff5e6c; text-align:center;'>Lỗi kết nối bình luận.</p>";
      }
    }

    function buildCarousel(stories) {
      const top5 = stories.slice(0, 5);
      const wrapper = document.getElementById('hero-carousel');
      const dotsContainer = document.getElementById('carousel-dots');
      const prevBtn = document.getElementById('carousel-prev');
      const nextBtn = document.getElementById('carousel-next');

      if (top5.length === 0) return;

      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';

      let currentSlide = 0;
      let autoTimer;

      wrapper.innerHTML = '';
      dotsContainer.innerHTML = '';

      top5.forEach((story, i) => {
        const allTags = story.tags || [];
        const displayTags = allTags.slice(0, 2);
        let tagsHTML = displayTags.map(t => `<span class="tag-badge">${t}</span>`).join('');
        if (allTags.length > 2) tagsHTML += `<span class="tag-badge plus-tag">+${allTags.length - 2}</span>`;

        const slide = document.createElement('div');
        slide.className = `carousel-slide${i === 0 ? ' active' : ''}`;
        slide.innerHTML = `
          <div class="carousel-bg" style="background-image:url('${story.coverImage}')"></div>
          <div class="carousel-scrim"></div>
          <div class="carousel-content">
            <img src="${story.coverImage}" class="carousel-cover" alt="${story.title}">
            <div class="carousel-info">
              <div class="carousel-label">Truyện nổi bật</div>
              <div class="carousel-title">${story.title}</div>
              <div class="carousel-tags">${tagsHTML}</div>
              <div class="carousel-stats">
                <span class="stat-item">${ICON_EYE} ${(story.views || 0).toLocaleString('vi-VN')}</span>
                <span class="stat-item">${ICON_HEART} ${(story.likeCount || 0).toLocaleString('vi-VN')}</span>
              </div>
              <a href="info.html?id=${story.id}" class="carousel-read-btn">▶ Đọc Ngay</a>
            </div>
          </div>
        `;
        wrapper.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = `carousel-dot${i === 0 ? ' active' : ''}`;
        dot.setAttribute('aria-label', `Slide ${i + 1}`);
        dot.addEventListener('click', () => { goTo(i); resetTimer(); });
        dotsContainer.appendChild(dot);
      });

      const slides = wrapper.querySelectorAll('.carousel-slide');
      const dots = dotsContainer.querySelectorAll('.carousel-dot');

      function goTo(index) {
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = ((index % top5.length) + top5.length) % top5.length;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
      }

      prevBtn.addEventListener('click', () => { goTo(currentSlide - 1); resetTimer(); });
      nextBtn.addEventListener('click', () => { goTo(currentSlide + 1); resetTimer(); });

      function resetTimer() {
        clearInterval(autoTimer);
        autoTimer = setInterval(() => goTo(currentSlide + 1), 6000);
      }

      let touchStartX = 0;
      wrapper.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
      wrapper.addEventListener('touchend', (e) => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) { diff > 0 ? goTo(currentSlide + 1) : goTo(currentSlide - 1); resetTimer(); }
      }, { passive: true });

      resetTimer();
    }

    async function fetchStories() {
      try {
        const storiesRef = collection(db, "stories");

        // Carousel riêng: top 5 theo lượt xem
        const carouselQ = query(storiesRef, orderBy("views", "desc"), limit(5));
        const carouselSnap = await getDocs(carouselQ);
        const carouselStories = [];
        carouselSnap.forEach(doc => carouselStories.push({ id: doc.id, ...doc.data() }));
        buildCarousel(carouselStories);

        // Danh sách truyện: tất cả, mới nhất trước
        const q = query(storiesRef, orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        querySnapshot.forEach((doc) => {
          allStoriesArray.push({ id: doc.id, ...doc.data() });
        });

        currentFilteredData = allStoriesArray;
        updateView();
        populateDynamicTags();
        fetchRecentComments();

      } catch (error) {
        console.error("Lỗi kéo dữ liệu: ", error);
        storiesGrid.innerHTML = "<div class='empty-msg'>Lỗi kết nối máy chủ.</div>";
      }
    }

    async function fetchAnnouncement() {
      try {
        const snap = await getDoc(doc(db, "config", "announcement"));
        if (snap.exists() && snap.data().message) {
          document.getElementById('announcement-text').textContent = snap.data().message;
          document.getElementById('announcement-banner').style.display = 'block';
        }
      } catch(e) {}
    }

    fetchStories();
    fetchAnnouncement();
  </script>
</body>

</html>
