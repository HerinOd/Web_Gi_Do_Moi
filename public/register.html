<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(240,165,0,0.07) 0%, transparent 65%),
                var(--bg-base);
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 44px 40px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.03);
            animation: fadeSlideUp 0.4s var(--ease) both;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-brand .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            display: block;
            margin-bottom: 6px;
        }

        .auth-brand .tagline {
            color: var(--text-2);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: var(--text-2);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            pointer-events: none;
            line-height: 1;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-1);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group input::placeholder { color: var(--text-3); }

        .form-hint {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 5px;
        }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #0e0e16;
            border: none;
            font-weight: 700;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            border-radius: var(--radius-sm);
            margin-top: 6px;
            transition: background 0.2s var(--ease), transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
        }

        .auth-btn:hover {
            background: var(--accent-dark);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .auth-btn:active { transform: translateY(0); }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            color: var(--text-3);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .auth-footer a:hover { opacity: 0.8; text-decoration: underline; }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099</a>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="logo-text">Mã Đề 0099</span>
                <span class="tagline">Tạo tài khoản miễn phí</span>
            </div>

            <div class="form-group">
                <label>Tên hiển thị</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="reg-name" placeholder="Nickname của bạn" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <div class="form-hint">Tối thiểu 6 ký tự</div>
            </div>

            <button class="auth-btn" id="btnRegister">Tạo Tài Khoản</button>

            <div class="auth-footer">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // Bổ sung import signOut để bẻ gãy Session ngay lập tức
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnRegister').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const btn = document.getElementById('btnRegister');

            if (!name || !email || !pass) {
                alert("Vui lòng điền đủ thông tin!");
                return;
            }

            btn.textContent = "Đang tạo tài khoản...";
            btn.disabled = true;

            try {
                // 1. Khởi tạo Identity trên Firebase Auth Node (Firebase sẽ tự auto-login)
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Dispatch luồng SMTP xác thực Email
                await sendEmailVerification(user);

                // 3. Lưu Metadata vào Database Lớp Model
                const userObject = {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    role: "user",
                    bookmarked: [],
                    following: [],
                    createdAt: new Date().toISOString()
                };
                await setDoc(doc(db, "users", user.uid), userObject);

                // 4. KIỂM SOÁT LUỒNG (SESSION TERMINATION) CỰC KỲ QUAN TRỌNG
                // Hủy ngay lập tức phiên đăng nhập tự động của Firebase
                await signOut(auth);

                alert("Tạo tài khoản thành công! Hệ thống đã gửi một Link Xác Thực tới Email của bạn. Vui lòng kiểm tra (cả hộp thư Spam) để kích hoạt tài khoản trước khi đăng nhập.");

                // Đổi luồng Routing: Bắt về màn hình Login để Gatekeeper làm việc
                window.location.href = "login.html";
            } catch (error) {
                console.error(error);
                alert("Lỗi tạo tài khoản (Có thể Email đã tồn tại hoặc Mật khẩu quá ngắn).");
                btn.textContent = "Tạo Tài Khoản";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
