<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Doomixi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1f1f2e;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #2a2a35;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
            color: #ffaa00;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #e0e0e0;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: #121218;
            border: 1px solid #2a2a35;
            color: #fff;
            border-radius: 4px;
        }

        .auth-btn {
            width: 100%;
            padding: 10px;
            background: #ffaa00;
            color: #121218;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: #e69900;
        }

        .toggle-text {
            text-align: center;
            margin-top: 15px;
            display: block;
            color: #aaa;
            font-size: 14px;
            text-decoration: none;
        }

        .toggle-text:hover {
            color: #ffaa00;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Doomixi</a>
        </div>
    </header>

    <div class="auth-container">
        <h2 class="auth-header">Đăng Ký Tài Khoản</h2>
        <div class="form-group">
            <label>Tên hiển thị (Nickname)</label>
            <input type="text" id="reg-name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu (Tối thiểu 6 ký tự)</label>
            <input type="password" id="reg-password" required>
        </div>
        <button class="auth-btn" id="btnRegister">Khởi tạo Tài Khoản</button>
        <a href="login.html" class="toggle-text">Đã có tài khoản? Quay lại đăng nhập</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // Bổ sung import signOut để bẻ gãy Session ngay lập tức
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnRegister').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const btn = document.getElementById('btnRegister');

            if (!name || !email || !pass) {
                alert("Vui lòng điền đủ thông tin!");
                return;
            }

            btn.textContent = "Đang tạo tài khoản...";
            btn.disabled = true;

            try {
                // 1. Khởi tạo Identity trên Firebase Auth Node (Firebase sẽ tự auto-login)
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Dispatch luồng SMTP xác thực Email
                await sendEmailVerification(user);

                // 3. Lưu Metadata vào Database Lớp Model
                const userObject = {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    role: "user",
                    bookmarked: [],
                    following: [],
                    createdAt: new Date().toISOString()
                };
                await setDoc(doc(db, "users", user.uid), userObject);

                // 4. KIỂM SOÁT LUỒNG (SESSION TERMINATION) CỰC KỲ QUAN TRỌNG
                // Hủy ngay lập tức phiên đăng nhập tự động của Firebase
                await signOut(auth);

                alert("Tạo tài khoản thành công! Hệ thống đã gửi một Link Xác Thực tới Email của bạn. Vui lòng kiểm tra (cả hộp thư Spam) để kích hoạt tài khoản trước khi đăng nhập.");

                // Đổi luồng Routing: Bắt về màn hình Login để Gatekeeper làm việc
                window.location.href = "login.html";
            } catch (error) {
                console.error(error);
                alert("Lỗi tạo tài khoản (Có thể Email đã tồn tại hoặc Mật khẩu quá ngắn).");
                btn.textContent = "Khởi tạo Tài Khoản";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
