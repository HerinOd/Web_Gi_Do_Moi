<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Đặt Tài Khoản - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            background: #1f1f2e;
            border-radius: 8px;
            border: 1px solid #2a2a35;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ffaa00;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #121218;
            border: 1px solid #2a2a35;
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .avatar-preview-block {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #121218;
            border: 2px solid #ffaa00;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            color: #121218;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #e69900;
        }

        #auth-warning {
            text-align: center;
            color: #ff5555;
            padding: 50px 0;
        }

        #settings-form {
            display: none;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099 - Cài Đặt</a>
        </div>
    </header>

    <div class="settings-container">
        <div id="auth-warning">
            <h2>Vui lòng đăng nhập để cấu hình tài khoản!</h2>
            <br>
            <a href="login.html" style="color: #ffaa00; text-decoration: underline;">Đi tới Đăng nhập</a>
        </div>

        <form id="settings-form">
            <h2 style="text-align: center; margin-bottom: 25px; color: #e0e0e0;">Chỉnh Sửa Hồ Sơ</h2>

            <div class="form-group">
                <label>Ảnh Đại Diện (Avatar)</label>
                <div class="avatar-preview-block">
                    <img src="" id="current-avatar" class="avatar-preview" alt="Avatar">
                    <input type="file" id="avatar-file" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label for="displayName">Tên Hiển Thị (Nickname)</label>
                <input type="text" id="displayName" required>
            </div>

            <div class="form-group">
                <label for="bio">Tiểu Sử / Giới Thiệu Bản Thân</label>
                <textarea id="bio" placeholder="Viết vài dòng giới thiệu về bạn..."></textarea>
            </div>

            <button type="submit" class="save-btn" id="btnSave">Lưu Thay Đổi</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentUploadedAvatarUrl = ""; // Lưu URL ảnh cũ nếu không đổi

        const warningBox = document.getElementById('auth-warning');
        const settingsForm = document.getElementById('settings-form');

        // 1. Kiểm tra Token trạng thái đăng nhập
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                warningBox.style.display = 'none';
                settingsForm.style.display = 'block';

                // Lệnh Read: Đổ dữ liệu cũ từ Database vào các ô Input ở lớp View
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    document.getElementById('displayName').value = userData.displayName || "";
                    document.getElementById('bio').value = userData.bio || "";

                    // Xử lý hiển thị avatar mặc định nếu chưa từng upload
                    currentUploadedAvatarUrl = userData.avatar || "https://www.w3schools.com/howto/img_avatar.png";
                    document.getElementById('current-avatar').src = currentUploadedAvatarUrl;
                }
            } else {
                currentUser = null;
                warningBox.style.display = 'block';
                settingsForm.style.display = 'none';
            }
        });

        // 2. Lắng nghe sự kiện Submit Form (CRUD - UPDATE)
        const btnSave = document.getElementById('btnSave');

        settingsForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) return;

            btnSave.textContent = "Đang xử lý cập nhật...";
            btnSave.disabled = true;

            try {
                const fileInput = document.getElementById('avatar-file').files[0];
                let finalAvatarUrl = currentUploadedAvatarUrl;

                // Tách luồng logic: Chỉ upload lên ImgBB nếu người dùng chọn file ảnh mới
                if (fileInput) {
                    btnSave.textContent = "Đang tải ảnh đại diện lên mây...";
                    const imgbbApiKey = "c73ecf8bf9b0b41e03fd4e1c2a83f57a";
                    const formData = new FormData();
                    formData.append("image", fileInput);
                    formData.append("key", imgbbApiKey);

                    const response = await fetch("https://api.imgbb.com/1/upload", {
                        method: "POST",
                        body: formData
                    });
                    const resData = await response.json();
                    finalAvatarUrl = resData.data.display_url;
                }

                // Đóng gói dữ liệu chỉnh sửa
                const updateObject = {
                    displayName: document.getElementById('displayName').value.trim(),
                    bio: document.getElementById('bio').value.trim(),
                    avatar: finalAvatarUrl
                };

                // Lệnh Update: Chỉ sửa đổi các trường được khai báo trong updateObject
                const userDocRef = doc(db, "users", currentUser.uid);
                await updateDoc(userDocRef, updateObject);

                alert("Cập nhật hồ sơ thành công!");

                // Định tuyến sang trang profile cá nhân công khai kèm UID
                window.location.href = `profile.html?uid=${currentUser.uid}`;

            } catch (error) {
                console.error("Lỗi cập nhật hồ sơ:", error);
                alert("Đã xảy ra lỗi trong quá trình lưu dữ liệu.");
            } finally {
                btnSave.textContent = "Lưu Thay Đổi";
                btnSave.disabled = false;
            }
        });
    </script>
</body>

</html>
