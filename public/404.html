<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Không Tìm Thấy Trang - Mã Đề 0099</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(240, 165, 0, 0.07) 0%, transparent 65%),
        var(--bg-base);
    }

    .nf-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      text-align: center;
    }

    .nf-code {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 8px 40px var(--accent-glow);
    }

    .nf-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 12px;
    }

    .nf-text {
      color: var(--text-2);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto 28px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="logo">Mã Đề 0099</a>
    </div>
  </header>

  <div class="nf-wrapper">
    <div>
      <div class="nf-code">404</div>
      <div class="nf-title">Lạc mất trang rồi!</div>
      <p class="nf-text">
        Trang bạn tìm không tồn tại hoặc đã bị xóa. Có thể đường dẫn bị sai, hãy kiểm tra lại nhé.
      </p>
      <a href="index.html" class="btn btn-primary">Về Trang Chủ</a>
    </div>
  </div>
</body>

</html>
