<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Truyện - Mã Đề 0099</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            background: #222d3e;
            border-radius: 8px;
            border: 1px solid #324056;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #5ba3e0;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #121a28;
            border: 1px solid #324056;
            color: #eceff3;
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #5ba3e0;
            color: #121a28;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #4a8fce;
        }

        #auth-warning {
            display: none;
            text-align: center;
            color: #ff5e6c;
            padding: 50px 0;
        }

        #add-story-form {
            display: none;
        }

        .help-text {
            font-size: 12px;
            color: #9aa7bc;
            margin-top: 5px;
            font-style: italic;
        }

        /* KHỐI CSS MODULE TAGS INPUT */
        .tags-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: #121a28;
            border: 1px solid #324056;
            border-radius: 4px;
        }

        .tags-input-container:focus-within {
            border-color: #5ba3e0;
        }

        /* Đổi màu viền khi đang gõ */

        .tag-bubble-edit {
            background: #5ba3e0;
            color: #121a28;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-bubble-edit span {
            cursor: pointer;
            color: #121a28;
            font-weight: bold;
            font-size: 14px;
        }

        .tag-bubble-edit span:hover {
            color: #ff5e6c;
        }

        .tags-input-container input {
            flex: 1;
            border: none !important;
            background: transparent !important;
            color: #eceff3;
            outline: none;
            min-width: 150px;
            padding: 4px 0 !important;
        }

        .tags-wrapper {
            position: relative;
        }

        .tags-dropdown-btn {
            background: rgba(91, 163, 224, 0.08);
            border: 1px solid rgba(91, 163, 224, 0.28);
            color: #5ba3e0;
            cursor: pointer;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 20px;
            flex-shrink: 0;
            white-space: nowrap;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
        }

        .tags-dropdown-btn:hover {
            background: rgba(91, 163, 224, 0.18);
            border-color: rgba(91, 163, 224, 0.5);
        }

        .tags-dropdown-panel {
            position: absolute;
            top: calc(100% + 2px);
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-height: 180px;
            overflow-y: auto;
            padding: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tags-dropdown-chip {
            background: var(--bg-hover);
            color: var(--text-1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #324056;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            user-select: none;
        }

        .tags-dropdown-chip:hover:not(.selected) {
            background: #5ba3e0;
            color: #121a28;
            border-color: #5ba3e0;
        }

        .tags-dropdown-chip.selected {
            background: rgba(91, 163, 224, 0.15);
            color: #5ba3e0;
            border-color: #5ba3e0;
            cursor: default;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Mã Đề 0099 - Quản Lý Truyện</a>
        </div>
    </header>

    <div class="admin-container">
        <div id="auth-warning">
            <h2>Vui lòng đăng nhập để sử dụng tính năng này!</h2><br>
            <a href="login.html" style="color: #5ba3e0; text-decoration: underline;">Đi tới trang Đăng nhập</a>
        </div>

        <form id="add-story-form">
            <h2 id="form-title" style="text-align: center; margin-bottom: 20px; color: #eceff3;">Khởi tạo Truyện Mới
            </h2>

            <div class="form-group">
                <label for="title">Tên Truyện</label>
                <input type="text" id="title" placeholder="Nhập tên bộ truyện..." required>
            </div>

            <div class="form-group">
                <label for="originalAuthor">Tác Giả Gốc</label>
                <input type="text" id="originalAuthor" placeholder="Tên tác giả gốc..." required>
            </div>

            <div class="form-group">
                <label>Thể Loại (Tags)</label>
                <div class="tags-wrapper" id="tags-wrapper">
                    <div class="tags-input-container" id="tags-container">
                        <input type="text" id="tag-input" placeholder="Chọn thể loại..." autocomplete="off">
                        <button type="button" class="tags-dropdown-btn" id="tags-dropdown-btn">Chọn Tags ▾</button>
                    </div>
                    <div class="tags-dropdown-panel" id="tags-dropdown-panel" style="display:none;"></div>
                </div>
                <div class="help-text">Nhập và nhấn Enter để thêm 1 tag, Backspace để xóa tag. Bấm "Chọn Tags" để xem
                    các tags
                    có sẵn.
                </div>
            </div>

            <div class="form-group">
                <label for="status">Trạng Thái</label>
                <select id="status">
                    <option value="Đang Tiến Hành">Đang Tiến Hành</option>
                    <option value="Hoàn Thành">Hoàn Thành</option>
                    <option value="Tạm Dừng">Tạm Dừng</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Mô Tả Truyện (Tóm tắt)</label>
                <textarea id="description" placeholder="Nhập tóm tắt nội dung cốt truyện..." required></textarea>
            </div>

            <div class="form-group">
                <label for="coverImage">Ảnh Bìa (Chọn file từ máy tính)</label>
                <input type="file" id="coverImage" accept="image/*">
                <div class="help-text" id="image-help-text">Vui lòng chọn ảnh bìa (Bắt buộc).</div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Tạo Bộ Truyện</button>
        </form>
    </div>

    <script src="toast.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVAIacKswr9w5NagFnDoh5P9kcweztOmQ",
            authDomain: "web-truyen-3769d.firebaseapp.com",
            projectId: "web-truyen-3769d",
            storageBucket: "web-truyen-3769d.firebasestorage.app",
            messagingSenderId: "613339406890",
            appId: "1:613339406890:web:3304ae5de8bbc91bb5d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('editId');
        const isEditMode = !!editId;
        let existingImageUrl = "";

        let currentUserId = null;
        let currentUserData = null;
        let originalUploaderId = null;

        // ==========================================
        // MODULE: XỬ LÝ TAGS BẰNG ARRAY VÀ DOM
        // ==========================================
        let currentTagsArray = [];
        const tagInput = document.getElementById('tag-input');
        const tagsContainer = document.getElementById('tags-container');

        function renderTags() {
            document.querySelectorAll('.tag-bubble-edit').forEach(el => el.remove());
            currentTagsArray.forEach((tag) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-bubble-edit';
                tagEl.textContent = tag;
                tagsContainer.insertBefore(tagEl, tagInput);
            });
        }

        function addTag(raw) {
            const val = raw.trim().replace(/,/g, '').trim();
            if (val !== "" && !currentTagsArray.some(t => t.toLowerCase() === val.toLowerCase())) {
                currentTagsArray.push(val);
                renderTags();
            }
            tagInput.value = '';
        }

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addTag(tagInput.value);
            } else if (e.key === 'Backspace' && tagInput.value === '') {
                currentTagsArray.pop();
                renderTags();
            }
        });

        tagInput.addEventListener('input', () => {
            if (tagInput.value.includes(',')) {
                addTag(tagInput.value);
            }
        });

        tagInput.addEventListener('blur', () => {
            addTag(tagInput.value);
        });

        let existingTagsList = [];

        function populateDropdown() {
            const panel = document.getElementById('tags-dropdown-panel');
            panel.innerHTML = '';
            if (existingTagsList.length === 0) {
                panel.innerHTML = '<span style="color:#5e6e86;font-size:12px;">Chưa có tags nào có sẵn.</span>';
                return;
            }
            existingTagsList.forEach(tag => {
                const chip = document.createElement('div');
                chip.className = 'tags-dropdown-chip';
                chip.textContent = tag;
                if (currentTagsArray.some(t => t.toLowerCase() === tag.toLowerCase())) {
                    chip.classList.add('selected');
                } else {
                    chip.addEventListener('click', () => {
                        currentTagsArray.push(tag);
                        renderTags();
                        populateDropdown();
                    });
                }
                panel.appendChild(chip);
            });
        }

        const tagsDropdownBtn = document.getElementById('tags-dropdown-btn');
        const tagsDropdownPanel = document.getElementById('tags-dropdown-panel');

        tagsDropdownBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isOpen = tagsDropdownPanel.style.display !== 'none';
            if (isOpen) {
                tagsDropdownPanel.style.display = 'none';
            } else {
                populateDropdown();
                tagsDropdownPanel.style.display = 'flex';
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#tags-wrapper')) {
                tagsDropdownPanel.style.display = 'none';
            }
        });

        async function loadExistingTags() {
            try {
                const snap = await getDoc(doc(db, "config", "tags"));
                if (snap.exists() && Array.isArray(snap.data().list)) {
                    existingTagsList = snap.data().list.sort();
                }
            } catch (e) { }
        }

        async function updateConfigTags(tags) {
            try {
                const ref = doc(db, "config", "tags");
                const snap = await getDoc(ref);
                let existing = (snap.exists() && Array.isArray(snap.data().list)) ? snap.data().list : [];
                tags.forEach(tag => {
                    if (!existing.some(t => t.toLowerCase() === tag.toLowerCase())) {
                        existing.push(tag);
                    }
                });
                await setDoc(ref, { list: existing });
            } catch (e) { console.error("Lỗi cập nhật tags:", e); }
        }

        document.getElementById('add-story-form').addEventListener('keydown', function (event) {
            if (event.key === "Enter" && event.target.tagName !== "TEXTAREA") {
                event.preventDefault();
            }
        });


        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userSnap = await getDoc(doc(db, "users", currentUserId));
                if (userSnap.exists()) {
                    currentUserData = userSnap.data();
                }

                document.getElementById('add-story-form').style.display = 'block';
                document.getElementById('auth-warning').style.display = 'none';

                loadExistingTags();
                if (isEditMode) { initEditMode(); }

            } else {
                currentUserId = null;
                document.getElementById('add-story-form').style.display = 'none';
                document.getElementById('auth-warning').style.display = 'block';
            }
        });

        async function initEditMode() {
            document.getElementById('form-title').textContent = "Cập Nhật Thông Tin Truyện";
            document.getElementById('submitBtn').textContent = "Lưu Thay Đổi";
            document.getElementById('image-help-text').textContent = "Để trống nếu bạn không muốn thay đổi ảnh bìa cũ.";

            try {
                const storyRef = doc(db, "stories", editId);
                const storySnap = await getDoc(storyRef);

                if (storySnap.exists()) {
                    const data = storySnap.data();
                    originalUploaderId = data.uploaderId;

                    if (data.uploaderId !== currentUserId && currentUserData.role !== "admin") {
                        showToast("Lỗi Phân Quyền: Bạn không có quyền sửa bộ truyện này!", "error");
                        setTimeout(() => { window.location.href = "index.html"; }, 1500);
                        return;
                    }

                    document.getElementById('title').value = data.title;
                    document.getElementById('originalAuthor').value = data.originalAuthor;
                    document.getElementById('status').value = data.status;
                    document.getElementById('description').value = data.description || "";
                    existingImageUrl = data.coverImage;

                    if (data.tags && Array.isArray(data.tags)) {
                        currentTagsArray = data.tags;
                        renderTags();
                    }

                } else {
                    showToast("Bộ truyện không tồn tại!", "error");
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                }
            } catch (error) { console.error("Lỗi khi tải dữ liệu cũ: ", error); }
        }

        const form = document.getElementById('add-story-form');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUserId || !currentUserData) return;

            if (currentTagsArray.length === 0) {
                showToast("Vui lòng thêm ít nhất 1 thể loại (Tag) cho truyện!", "warning");
                tagInput.focus();
                return;
            }

            const imageFile = document.getElementById('coverImage').files[0];

            if (!isEditMode && !imageFile) {
                showToast("Vui lòng chọn ảnh bìa cho truyện mới!", "warning");
                return;
            }

            submitBtn.textContent = "Đang xử lý...";
            submitBtn.disabled = true;

            try {
                let finalImageUrl = existingImageUrl;

                if (imageFile) {
                    submitBtn.textContent = "Đang tải ảnh lên máy chủ...";
                    const imgbbApiKey = "c73ecf8bf9b0b41e03fd4e1c2a83f57a";
                    const formData = new FormData();
                    formData.append("image", imageFile);
                    formData.append("key", imgbbApiKey);

                    const imgbbResponse = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData });
                    const imgbbData = await imgbbResponse.json();
                    finalImageUrl = imgbbData.data.display_url;
                }

                submitBtn.textContent = "Đang ghi vào Cơ sở dữ liệu...";

                const titleInput = document.getElementById('title').value;
                const authorInput = document.getElementById('originalAuthor').value;
                const statusInput = document.getElementById('status').value;
                const descriptionInput = document.getElementById('description').value.trim();

                const storyObject = {
                    title: titleInput,
                    originalAuthor: authorInput,
                    tags: currentTagsArray,
                    status: statusInput,
                    description: descriptionInput,
                    coverImage: finalImageUrl,
                };

                // Chỉ đồng bộ tên/avatar khi chính chủ truyện tự sửa, tránh admin edit làm ghi đè thông tin người đăng
                if (!isEditMode || currentUserId === originalUploaderId) {
                    storyObject.uploaderName = currentUserData.displayName || "Ẩn danh";
                    storyObject.uploaderAvatar = currentUserData.avatar || "https://www.w3schools.com/howto/img_avatar.png";
                }

                if (isEditMode) {
                    const storyRef = doc(db, "stories", editId);
                    await updateDoc(storyRef, storyObject);
                    await updateConfigTags(currentTagsArray);
                    showToast("Cập nhật thông tin truyện thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = `info.html?id=${editId}`;
                } else {
                    // Khi Tạo Mới thì mới bơm thêm Khóa ngoại và các Biến đếm (Counters)
                    storyObject.uploaderId = currentUserId;
                    storyObject.createdAt = new Date().toISOString();
                    storyObject.views = 0;
                    storyObject.likeCount = 0;

                    const docRef = await addDoc(collection(db, "stories"), storyObject);
                    await updateConfigTags(currentTagsArray);
                    showToast("Tạo bộ truyện thành công!", "success");
                    await new Promise(r => setTimeout(r, 1200));
                    window.location.href = `info.html?id=${docRef.id}`;
                }

            } catch (error) {
                console.error("Lỗi hệ thống: ", error);
                showToast("Đã xảy ra lỗi, vui lòng xem Console (F12) để debug.", "error");
                submitBtn.textContent = isEditMode ? "Lưu Thay Đổi" : "Tạo Bộ Truyện";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
